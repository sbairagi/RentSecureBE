[import-linter]

root_package = "rentsecure_be"

[layers]
order = ["rentsecure_be", "core", "properties", "smartbot", "finance", "notification", "documents", "referral_and_earn", "ai_assistant", "dashboard"]

[layers.rentsecure_be contracts]
contracts = ["rentsecure_be.*"]

[layers.core contracts]
contracts = ["core.*", "rentsecure_be.*"]

[layers.properties contracts]
contracts = ["properties.*", "core.*", "rentsecure_be.*"]

[layers.smartbot contracts]
contracts = ["smartbot.*", "core.*", "rentsecure_be.*"]

[layers.finance contracts]
contracts = ["finance.*", "core.*", "rentsecure_be.*", "properties.*"]

[layers.notification contracts]
contracts = ["notification.*", "core.*", "rentsecure_be.*"]

[layers.documents contracts]
contracts = ["documents.*", "core.*", "rentsecure_be.*", "properties.*"]

[layers.referral_and_earn contracts]
contracts = ["referral_and_earn.*", "core.*", "rentsecure_be.*"]

[layers.ai_assistant contracts]
contracts = ["ai_assistant.*", "core.*", "rentsecure_be.*"]

[layers.dashboard contracts]
contracts = ["dashboard.*", "core.*", "rentsecure_be.*"]

[settings]
exclude = [".venv", "venv", "build", "dist", "__pycache__", "migrations", ".pytest_cache", ".kilo", "properties/_legacy", "properties/refactored_models_combined.py", "properties/original_models.py"]
squashed_modules = ["rentsecure_be", "core", "properties", "smartbot", "finance", "notification", "documents", "referral_and_earn", "ai_assistant", "dashboard"]
