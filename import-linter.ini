[importlinter]
root_packages =
	core
	properties
	smartbot
	finance
	notification
	documents
	referral_and_earn
	ai_assistant
	dashboard
	rentsecure_be

[importlinter:rentsecure_be]
type = layers
name = rentsecure_be
layers =
	rentsecure_be

[importlinter:core]
type = contracts
contracts =
	core -> rentsecure_be
	properties -> core
	core -> properties

[importlinter:properties]
type = contracts
contracts =
	properties -> core
	properties -> rentsecure_be
	core -> properties

[importlinter:smartbot]
type = layers
name = smartbot
layers =
	smartbot
	rentsecure_be

[importlinter:finance]
type = layers
name = finance
layers =
	finance
	rentsecure_be

[importlinter:notification]
type = layers
name = notification
layers =
	notification
	rentsecure_be

[importlinter:documents]
type = layers
name = documents
layers =
	documents
	rentsecure_be

[importlinter:referral_and_earn]
type = layers
name = referral_and_earn
layers =
	referral_and_earn
	rentsecure_be

[importlinter:ai_assistant]
type = layers
name = ai_assistant
layers =
	ai_assistant
	rentsecure_be

[importlinter:dashboard]
type = layers
name = dashboard
layers =
	dashboard
	rentsecure_be

[importlinter:shared_core]
type = contracts
contracts =
	core -> properties
	properties -> core
	core -> referral_and_earn
	properties -> referral_and_earn
	referral_and_earn -> core
	referral_and_earn -> properties

[importlinter:cross_app]
type = contracts
contracts =
	finance -> rentsecure_be
	finance -> core
	finance -> properties
	documents -> rentsecure_be
	documents -> core
	documents -> properties
	smartbot -> rentsecure_be
	smartbot -> core
	smartbot -> properties

[settings]
exclude =
	.venv
	venv
	build
	dist
	__pycache__
	migrations
	.pytest_cache
	.github
	.kilo
	properties/_legacy
	properties/refactored_models_combined.py
	properties/original_models.py
squashed_modules =
	rentsecure_be
	core
	properties
	smartbot
	finance
	notification
	documents
	referral_and_earn
	ai_assistant
	dashboard
