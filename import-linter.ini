[importlinter]
root_packages =
	core
	properties
	smartbot
	finance
	notification
	documents
	referral_and_earn
	ai_assistant
	dashboard
	rentsecure_be
	shared

[importlinter:rentsecure_be]
type = layers
name = rentsecure_be
layers =
	rentsecure_be
	shared

[importlinter:shared]
type = layers
name = shared
layers =
	shared

[importlinter:core]
type = layers
name = core
layers =
	core
	shared
	rentsecure_be

[importlinter:smartbot]
type = layers
name = smartbot
layers =
	smartbot
	shared
	rentsecure_be

[importlinter:finance]
type = layers
name = finance
layers =
	finance
	shared
	rentsecure_be

[importlinter:notification]
type = layers
name = notification
layers =
	notification
	shared
	rentsecure_be

[importlinter:documents]
type = layers
name = documents
layers =
	documents
	shared
	rentsecure_be

[importlinter:referral_and_earn]
type = layers
name = referral_and_earn
layers =
	referral_and_earn
	shared
	rentsecure_be

[importlinter:ai_assistant]
type = layers
name = ai_assistant
layers =
	ai_assistant
	shared
	rentsecure_be

[importlinter:dashboard]
type = layers
name = dashboard
layers =
	dashboard
	shared
	rentsecure_be

[settings]
exclude =
	.venv
	venv
	build
	dist
	__pycache__
	migrations
	.pytest_cache
	.github
	.kilo
	properties/_legacy
	properties/refactored_models_combined.py
	properties/original_models.py
	conftest.py
	manage.py
	noxfile.py
	management
squashed_modules =
	rentsecure_be
	core
	properties
	smartbot
	finance
	notification
	documents
	referral_and_earn
	ai_assistant
	dashboard
