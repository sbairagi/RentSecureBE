[importlinter]
root_packages =
	core
	properties
	smartbot
	finance
	notification
	documents
	referral_and_earn
	payments
	shared

[importlinter:shared]
type = layers
name = shared
layers =
	shared

[importlinter:core]
type = layers
name = core
layers =
	core
	shared

[importlinter:properties]
type = layers
name = properties
layers =
	properties
	shared

[importlinter:payments]
type = layers
name = payments
layers =
	payments
	properties
	shared

[importlinter:notification]
type = layers
name = notification
layers =
	notification
	shared

[importlinter:finance]
type = layers
name = finance
layers =
	finance
	payments
	properties
	documents
	shared

[importlinter:documents]
type = layers
name = documents
layers =
	documents
	shared

[importlinter:referral_and_earn]
type = layers
name = referral_and_earn
layers =
	referral_and_earn
	shared

[importlinter:smartbot]
type = layers
name = smartbot
layers =
	smartbot
	shared

[settings]
exclude =
	.venv
	venv
	build
	dist
	__pycache__
	migrations
	.pytest_cache
	.github
	.kilo
	properties/_legacy
	properties/refactored_models_combined.py
	properties/original_models.py
	conftest.py
	manage.py
	noxfile.py
	management
	tests
	documents/tests
	payments/tests
	notification/tests
	core/tests
	properties/tests
	finance/tests
	referral_and_earn/tests
	rentsecure_be/tests
	smartbot/tests
squashed_modules =
	core
	properties
	smartbot
	finance
	notification
	documents
	referral_and_earn
	payments
	shared
