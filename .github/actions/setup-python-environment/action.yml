name: "Setup Python & Install Dependencies"
description: "Installs Python, sets up caches, and installs project dependencies."
inputs:
  python-version:
    description: "Python version to install"
    default: "3.12"
  requirements-file:
    description: "Path to requirements file"
    default: "requirements.txt"
  extra-packages:
    description: "Additional packages to install (space-separated)"
    default: ""
  cache-key-suffix:
    description: "Optional suffix for cache key"
    default: ""
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles(inputs.requirements-file, 'pyproject.toml') }}${{ inputs.cache-key-suffix }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ inputs.cache-key-suffix }}
    - name: Cache mypy
      uses: actions/cache@v4
      with:
        path: .mypy_cache
        key: ${{ runner.os }}-mypy-${{ hashFiles(inputs.requirements-file, 'pyproject.toml') }}${{ inputs.cache-key-suffix }}
        restore-keys: |
          ${{ runner.os }}-mypy-${{ inputs.cache-key-suffix }}
    - name: Cache pytest
      uses: actions/cache@v4
      with:
        path: |
          .pytest_cache
          .pytest-split
        key: ${{ runner.os }}-pytest-${{ hashFiles(inputs.requirements-file, 'pyproject.toml') }}${{ inputs.cache-key-suffix }}
        restore-keys: |
          ${{ runner.os }}-pytest-${{ inputs.cache-key-suffix }}
    - name: Cache pre-commit
      uses: actions/cache@v4
      with:
        path: ~/.cache/pre-commit
        key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}${{ inputs.cache-key-suffix }}
        restore-keys: |
          ${{ runner.os }}-pre-commit-${{ inputs.cache-key-suffix }}
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f "${{ inputs.requirements-file }}" ]; then
          pip install -r ${{ inputs.requirements-file }}
        fi
        if [ -n "${{ inputs.extra-packages }}" ]; then
          pip install ${{ inputs.extra-packages }}
        fi
