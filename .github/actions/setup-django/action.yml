name: "Setup Python & Install Dependencies"
description: "Installs Python, sets up pip cache, and installs project dependencies. Does NOT perform checkout."
inputs:
  python-version:
    description: "Python version to install"
    type: string
    default: "3.12"
  requirements-file:
    description: "Path to requirements file"
    type: string
    default: "requirements.txt"
  extra-packages:
    description: "Additional packages to install (space-separated)"
    type: string
    default: ""
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles(inputs.requirements-file) }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f "${{ inputs.requirements-file }}" ]; then
          pip install -r ${{ inputs.requirements-file }}
        fi
        if [ -n "${{ inputs.extra-packages }}" ]; then
          pip install ${{ inputs.extra-packages }}
        fi
