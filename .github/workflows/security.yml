# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 6: Security & Supply Chain (PR Fast-Track)
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: Bandit (matrix per app), Pip-audit, Semgrep, Trivy FS, Gitleaks
# Deep scans (CodeQL, Scorecard, Dependency Review) run in security-deep.yml nightly.
# ═══════════════════════════════════════════════════════════════════════════════
name: Security

'on':
  workflow_call:
    inputs:
      run_dependency_review:
        description: "Run dependency-review job (true for PRs)"
        type: boolean
        default: false
  push:
    branches:
      - main
      - master
  pull_request:
    branches: [main, master, dev]

jobs:
  bandit:
    name: Stage 6a │ Bandit (SAST — Matrix)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        app: [rentsecure_be, core, properties, ai_assistant, notification, finance, smartbot, referral_and_earn, dashboard, documents]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "bandit"
          cache-key-suffix: "-bandit"
      - name: Run Bandit on ${{ matrix.app }}
        shell: bash
        run: |
          set -euo pipefail
          python -m bandit -r ${{ matrix.app }} \
            -x '*/tests/*,*/test_*.py,.venv,venv,migrations,.kilo,.github,management' \
            -lll

  pip-audit:
    name: Stage 6b │ Pip-audit (Dependency Scanner)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "pip-audit"
          cache-key-suffix: "-pip-audit"
      - name: Run Pip-audit on full requirements
        run: python -m pip_audit --requirement=requirements.txt --vulnerability-service=pypi --ignore-vuln PYSEC-2022-252

  semgrep:
    name: Stage 6c │ Semgrep (SAST — OWASP + Django)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/django
      - name: Upload Semgrep SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  trivy:
    name: Stage 6d │ Trivy (FS Vulnerability Scan)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: 'sarif'
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          skip-dirs: .venv,venv,build,dist,node_modules,.kilo,htmlcov
          vuln-type: 'os,library'
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db
      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  gitleaks:
    name: Stage 6e │ Gitleaks (Secret Scanning)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source=. --redact --log-level=warning
      - name: Upload Gitleaks SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif

  dependency-review:
    name: Stage 6f │ Dependency Review (License + Vuln)
    if: ${{ inputs.run_dependency_review }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-dep-review"
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, LGPL-3.0
