# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 6: Security & Supply Chain (PR Fast-Track)
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: Bandit (matrix per app), Pip-audit, Semgrep, Trivy FS, Gitleaks
# Deep scans (CodeQL, Scorecard, Dependency Review) run in security-deep.yml nightly.
# ═══════════════════════════════════════════════════════════════════════════════
name: Security

'on':
  workflow_call:
    inputs:
      run_dependency_review:
        description: "Run dependency-review job (true for PRs)"
        type: boolean
        default: false
  push:
    branches:
      - main
      - master
  pull_request:
    branches: [main, master, dev]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  bandit:
    name: Stage 6a │ Bandit (SAST — Matrix)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        app: [rentsecure_be, core, properties, ai_assistant, notification, finance, smartbot, referral_and_earn, dashboard, documents]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "bandit"
          cache-key-suffix: "-bandit"
      - name: Run Bandit on ${{ matrix.app }}
        shell: bash
        run: |
          set -euo pipefail
          python -m bandit -r ${{ matrix.app }} \
            -x '*/tests/*,*/test_*.py,.venv,venv,migrations,.kilo,.github,management' \
            -lll

  pip-audit:
    name: Stage 6b │ Pip-audit (Dependency Scanner)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "pip-audit"
          cache-key-suffix: "-pip-audit"
      - name: Run Pip-audit on full requirements
        run: python -m pip_audit --requirement=requirements.txt --vulnerability-service=pypi --ignore-vuln PYSEC-2022-252

  semgrep:
    name: Stage 6c │ Semgrep (SAST — OWASP + Django)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
            semgrep.dev:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "semgrep"
          cache-key-suffix: "-semgrep"
      - name: Run Semgrep
        shell: bash
        run: |
          set -euo pipefail
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/django \
            --sarif \
            --output semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN || '' }}
      - name: Upload Semgrep SARIF to GitHub Security
        if: ${{ !github.event.pull_request || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif

  trivy:
    name: Stage 6d │ Trivy (FS Vulnerability Scan)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            ghcr.io:443
            mirror.gcr.io:443
            get.trivy.dev:443
            release-assets.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - name: Run Trivy filesystem scan
        id: trivy-fs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: 'sarif'
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          skip-dirs: .venv,venv,build,dist,node_modules,.kilo,htmlcov
          vuln-type: 'os,library'
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db
      - name: Verify Trivy SARIF output exists
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f trivy-results.sarif ]; then
            echo "::error::Trivy filesystem scan did not produce trivy-results.sarif"
            echo "::error::Scan step id=trivy-fs outcome=${{ steps.trivy-fs.outcome }} conclusion=${{ steps.trivy-fs.conclusion }}"
            exit 1
          fi
      - name: Upload Trivy SARIF to GitHub Security
        if: ${{ !github.event.pull_request || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  trivy-secrets:
    name: Stage 6e │ Trivy (Secret Scanning)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            ghcr.io:443
            mirror.gcr.io:443
            get.trivy.dev:443
            release-assets.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - name: Run Trivy Secret Scan
        id: trivy-secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: 'sarif'
          output: trivy-secrets.sarif
          severity: 'HIGH,CRITICAL'
          scanners: secret
          ignore-unfixed: true
      - name: Verify Trivy Secret SARIF exists
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f trivy-secrets.sarif ]; then
            echo "::error::Trivy secret scan did not produce trivy-secrets.sarif"
            echo "::error::Scan step id=trivy-secrets outcome=${{ steps.trivy-secrets.outcome }} conclusion=${{ steps.trivy-secrets.conclusion }}"
            exit 1
          fi
      - name: Upload Trivy Secret SARIF
        if: ${{ !github.event.pull_request || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
        continue-on-error: true
        with:
          sarif_file: trivy-secrets.sarif

  dependency-review:
    name: Stage 6f │ Dependency Review (License + Vuln)
    if: ${{ inputs.run_dependency_review }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Verify Dependency Graph is available
        id: dep-graph-check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/dependency-graph/snapshots")
          echo "dependency_graph_status=${status}" >> $GITHUB_OUTPUT
          if [ "${status}" == "404" ]; then
            echo "Dependency Graph is not available for this repository. Skipping Dependency Review."
            exit 0
          elif [ "${status}" != "200" ]; then
            echo "::warning::Unexpected status ${status} from dependency-graph API. Attempting Dependency Review anyway."
          fi
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-dep-review"
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        if: ${{ steps.dep-graph-check.outputs.dependency_graph_status != '404' }}
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, LGPL-3.0
