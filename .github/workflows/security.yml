name: Security

"on":
  workflow_call:

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit on all app source directories
        run: |
          python -m bandit -r rentsecure_be -x '*/tests/*,*/test_*.py,.venv,venv,migrations,.kilo,.github,properties/refactored_models_combined.py,properties/original_models.py,management'
          python -m bandit -r core -x '*/tests/*,*/test_*.py,.venv,venv,migrations,.kilo,.github,properties/refactored_models_combined.py,properties/original_models.py,management'
          python -m bandit -r properties -x '*/tests/*,*/test_*.py,.venv,venv,migrations,.kilo,.github,properties/refactored_models_combined.py,properties/original_models.py,management'
          python -m bandit -r ai_assistant -x '*/tests/*,*/test_*.py,.venv,venv,migrations,.kilo,.github,properties/refactored_models_combined.py,properties/original_models.py,management'
          python -m bandit -r notification -x '*/tests/*,*/test_*.py,.venv,venv,migrations,.kilo,.github,properties/refactored_models_combined.py,properties/original_models.py,management'
          python -m bandit -r finance -x '*/tests/*,*/test_*.py,.venv,venv,migrations,.kilo,.github,properties/refactored_models_combined.py,properties/original_models.py,management'
          python -m bandit -r smartbot -x '*/tests/*,*/tests.py,*/test_*.py,.venv,venv,migrations,.kilo,.github,properties/refactored_models_combined.py,properties/original_models.py,management'
          python -m bandit -r referral_and_earn -x '*/tests/*,*/test_*.py,.venv,venv,migrations,.kilo,.github,properties/refactored_models_combined.py,properties/original_models.py,management'
          python -m bandit -r dashboard -x '*/tests/*,*/test_*.py,.venv,venv,migrations,.kilo,.github,properties/refactored_models_combined.py,properties/original_models.py,management'
          python -m bandit -r documents -x '*/tests/*,*/tests.py,*/test_*.py,.venv,venv,migrations,.kilo,.github,properties/refactored_models_combined.py,properties/original_models.py,management'
          python -m bandit -r management -x '*/tests/*,*/test_*.py,.venv,venv,migrations,.kilo,.github,properties/refactored_models_combined.py,properties/original_models.py,management'

  pip-audit:
    name: Pip-audit (Dependency Scanner)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
            pypi.org

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run Pip-audit on full requirements
        run: python -m pip_audit --requirement=requirements.txt --vulnerability-service=pypi --ignore-vuln PYSEC-2022-252

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            semgrep.dev:443
            semgrep.net:443

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/django
          generateSarif: true

      - name: Upload Semgrep SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  trivy:
    name: Trivy (FS Vulnerability Scanner)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            aquasecurity.github.io:443
            ghcr.io:443
            registry-1.docker.io:443

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: 'sarif'
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          skip-dirs: .venv,venv,build,dist,node_modules,.kilo,htmlcov
          vuln-type: 'os,library'
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  gitleaks:
    name: Gitleaks (Secret Scanning)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source=. --redact --log-level=warning

      - name: Upload Gitleaks SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, LGPL-3.0

  codeql:
    name: CodeQL (Security + Quality)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            codeql.githubusercontent.com:443
            github-releases.githubusercontent.com:443
            codeload.github.com:443

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
          upload: true

  osrf-scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            scorecard.dev:443
            api.scorecard.dev:443

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.0.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
