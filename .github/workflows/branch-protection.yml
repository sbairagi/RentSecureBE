name: Branch Protection Validation

# NOTE: GITHUB_TOKEN cannot call the Branch Protection API; a PAT with
# the `administration` scope must be provided via the `repo-access-pat`
# secret (repository Settings → Secrets → Actions).

on:
  workflow_call:
    secrets:
      repo-access-pat:
        description: "PAT with `administration` scope to read branch protection rules"
        required: true
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/branch-protection.yml'
      - 'scripts/architecture_contract.py'
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/branch-protection.yml'
      - 'scripts/architecture_contract.py'

permissions:
  contents: read

concurrency:
  group: branch-protection-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Branch Protection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "pyyaml"
          cache-key-suffix: "-branch-protection"

      - name: Validate required status checks are enforced
        if: ${{ secrets.repo-access-pat != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.repo-access-pat }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          import yaml

          repo = os.environ["REPOSITORY"]
          event_name = os.environ.get("EVENT_NAME", "")
          base_ref = os.environ.get("BASE_REF", "").strip()
          default_branch = os.environ.get("DEFAULT_BRANCH", "").strip()

          ci_path = Path(".github/workflows/ci.yml")
          with ci_path.open("r", encoding="utf-8") as fh:
              ci_config = yaml.safe_load(fh) or {}

          jobs = ci_config.get("jobs", {})
          required_job_ids = [
              "lint-fast",
              "test-shard-1",
              "test-shard-2",
              "test-shard-3",
              "test-shard-4",
              "quality",
              "deploy-readiness",
          ]
          expected_checks = []
          for job_id in required_job_ids:
              job_config = jobs.get(job_id, {})
              expected_checks.append(job_config.get("name") or job_id)

          branches = []
          if event_name == "pull_request" and base_ref:
              branches.append(base_ref)
          else:
              for candidate in [default_branch, "main", "master"]:
                  if candidate and candidate not in branches:
                      branches.append(candidate)

          if not branches:
              branches = ["main", "master"]

          failures = []
          for branch in branches:
              proc = subprocess.run(
                  ["gh", "api", f"/repos/{repo}/branches/{branch}/protection"],
                  capture_output=True,
                  text=True,
                  env={**os.environ, "GH_TOKEN": os.environ["GH_TOKEN"]},
                  check=False,
              )

              if proc.returncode != 0:
                  failures.append((branch, proc.stderr.strip() or proc.stdout.strip() or "protection is not configured"))
                  continue

              payload = json.loads(proc.stdout)
              required_status_checks = payload.get("required_status_checks") or {}
              strict = bool(required_status_checks.get("strict", False))
              contexts = set(required_status_checks.get("contexts") or [])
              checks = {
                  item.get("context")
                  for item in (required_status_checks.get("checks") or [])
                  if isinstance(item, dict) and item.get("context")
              }
              effective_contexts = contexts | checks

              if not strict:
                  failures.append((branch, "required_status_checks.strict is not enabled"))
                  continue

              missing = [check for check in expected_checks if check not in effective_contexts]
              if missing:
                  failures.append((branch, f"missing required statuses: {', '.join(missing)}"))
                  continue

              print(f"Branch protection validation passed for {branch}")

          if failures:
              print("Branch protection validation failed:")
              for branch, reason in failures:
                  print(f" - {branch}: {reason}")
              sys.exit(1)

          print("Branch protection validation passed for all checked branches")
          PY

      - name: Branch protection validation - PAT not available
        if: ${{ secrets.repo-access-pat == '' }}
        shell: bash
        run: |
          echo "WARNING: REPO_ACCESS_PAT is not available. Skipping branch protection validation."
          echo "Configure a repository secret named REPO_ACCESS_PAT with 'administration' scope to enable this check."
