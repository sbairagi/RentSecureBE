name: Property-Based Testing

"on":
  workflow_call:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 03:00 UTC
  pull_request:
    paths:
      - 'properties/**/*.py'
      - 'core/**/*.py'
      - 'finance/**/*.py'
      - 'smartbot/**/*.py'

concurrency:
  group: hypothesis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hypothesis:
    name: Hypothesis Property-Based Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      USE_SQLITE: "True"
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DEBUG: "False"
      DJANGO_ENV: test
      HYPOTHESIS_MAX_EXAMPLES: "200"
      HYPOTHESIS_VERBOSITY_LEVEL: "normal"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Harden Runner
        uses: step-security/harden-runner@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Run Hypothesis property tests
        run: |
          python -m pytest tests/test_properties_hypothesis.py tests/test_core_hypothesis.py -v \
            --hypothesis-show-statistics \
            --tb=short \
            --randomly-seed=last \
            || true
        timeout-minutes: 55

      - name: Upload Hypothesis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hypothesis-results
          path: |
            .hypothesis/
          retention-days: 30
