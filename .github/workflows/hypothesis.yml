name: Property-Based Testing

on:
  workflow_call:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 03:00 UTC
  pull_request:
    paths:
      - 'properties/**/*.py'
      - 'core/**/*.py'
      - 'finance/**/*.py'
      - 'smartbot/**/*.py'

concurrency:
  group: hypothesis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hypothesis:
    name: Hypothesis Property-Based Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rentsecure_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/rentsecure_test
      SECRET_KEY: test-secret-key-hypothesis-2026
      DEBUG: "False"
      DJANGO_ENV: test
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: rentsecure_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      HYPOTHESIS_MAX_EXAMPLES: "200"
      HYPOTHESIS_VERBOSITY_LEVEL: "normal"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
            docker.io:443
            registry-1.docker.io:443
            production.cloudflare.docker.com:443

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install psycopg2-binary

      - name: Run Hypothesis property tests
        run: |
          python -m pytest tests/test_properties_hypothesis.py tests/test_core_hypothesis.py -v \
            --hypothesis-show-statistics \
            --tb=short \
            --randomly-seed=last \
            || true
        timeout-minutes: 55

      - name: Upload Hypothesis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hypothesis-results
          path: |
            .hypothesis/
          retention-days: 30
