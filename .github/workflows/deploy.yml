# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 8b: Deploy to Production
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: EC2 SSH deploy, Sentry release & deploy tracking
# NOTE: Disabled temporarily — restore `push` trigger before actual deployment
# ═══════════════════════════════════════════════════════════════════════════════
name: Deploy Backend

"on":
  workflow_call:
  # DISABLED TEMPORARILY — restore before actual deployment
  # push:
  #   branches:
  #     - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Stage 8b │ Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: placeholder
          username: placeholder
      - name: Install Sentry CLI
        run: |
          curl -sL https://sentry.io/get-cli/ | bash

      - name: Create Sentry release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          export RELEASE=${GITHUB_SHA}
          ./sentry-cli releases new --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" "$RELEASE"
          ./sentry-cli releases set-commits --auto --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" "$RELEASE"
          ./sentry-cli releases finalize --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" "$RELEASE"
          ./sentry-cli releases deploys --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" "$RELEASE" new -e production
