# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 3e: Performance & Load Testing
# ═══════════════════════════════════════════════════════════════════════════════
# Jobs: load-test (Locust), perf-regression (pytest-benchmark)
# Mode: smoke (PRs — quick benchmark only), full (nightly/main — load + benchmark)
# ═══════════════════════════════════════════════════════════════════════════════
name: Load & Performance Regression Testing

'on':
  workflow_call:
    inputs:
      performance_mode:
        description: "smoke for PRs, full for nightly/main"
        type: string
        default: "smoke"
  push:
    branches:
      - main
      - master
  workflow_dispatch:


jobs:
  load-test:
    name: Stage 3e_i │ Locust Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ inputs.performance_mode == 'full' }}
    env:
      USE_SQLITE: "True"
      SECRET_KEY: test-secret-key-loadtest-2026
      DEBUG: "False"
      DJANGO_ENV: test
      ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      CELERY_TASK_ALWAYS_EAGER: "True"
      CELERY_TASK_EAGER_PROPOGATES: "True"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443

      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "psycopg2-binary locust==2.32.0"
          cache-key-suffix: "-performance-load"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --run-syncdb --verbosity=1

      - name: Seed test data
        run: python3 scripts/seed_load_test_data.py

      - name: Start Django dev server
        run: |
          python manage.py runserver 0.0.0.0:8000 --noreload &
          for i in $(seq 1 30); do
            if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/')" 2>/dev/null; then
              echo "Server ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
        timeout-minutes: 10

      - name: Run Locust load test
        run: |
          locust -f tests/load/locustfile.py \
            --headless \
            --host=http://127.0.0.1:8000 \
            --users 20 \
            --spawn-rate 2 \
            --run-time 2m \
            --html locust-report.html \
            --csv locust-report \
            --csv-full-history \
            --exit-code-on-error 1 \
            2>&1 | tee locust-output.txt
        timeout-minutes: 10

      - name: Check Locust performance thresholds
        run: python3 scripts/check_perf_thresholds.py

      - name: Upload Locust report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: |
            locust-report.html
            locust-report_*.csv
            locust-output.txt
          retention-days: 30

  perf-regression:
    name: Stage 3e_ii │ Pytest Benchmark Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      USE_SQLITE: "True"
      SECRET_KEY: test-secret-key-perf-bench-2026
      DEBUG: "False"
      DJANGO_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443

      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "psycopg2-binary pytest-benchmark==4.0.0"
          cache-key-suffix: "-performance-benchmark"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --run-syncdb --verbosity=1

      - name: Run benchmark tests
        run: |
          python -m pytest tests/test_performance_benchmarks.py -v \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --benchmark-sort=mean \
            --benchmark-columns=min,max,mean,stddev,median,rounds \
            --tb=short
        timeout-minutes: 25

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.json
          retention-days: 90
