name: Nightly Deep Validation

'on':
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  merge_group:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read


jobs:
  hypothesis:
    name: Hypothesis (Full) — Nightly
    uses: ./.github/workflows/hypothesis.yml
    with:
      hypothesis_mode: full
    secrets: inherit

  mutation:
    name: Mutation Testing (Full) — Nightly
    uses: ./.github/workflows/mutation.yml
    with:
      mutation_mode: full
    secrets: inherit

  benchmark:
    name: Benchmark — Nightly
    uses: ./.github/workflows/benchmark.yml
    secrets: inherit

  load-test:
    name: Load Test — Nightly
    uses: ./.github/workflows/load-test.yml
    secrets: inherit

  security-deep:
    name: Security Deep Scan — Nightly
    uses: ./.github/workflows/security-deep.yml
    secrets: inherit
    permissions:
      contents: read
      security-events: write
      actions: read
