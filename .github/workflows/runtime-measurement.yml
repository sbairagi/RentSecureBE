# ═══════════════════════════════════════════════════════════════════════════════
# RUNTIME MEASUREMENT: Collect CI performance metrics via GitHub Actions API
# ═══════════════════════════════════════════════════════════════════════════════
# Uses GitHub Actions API to collect last 30 successful CI runs.
# Generates Measured Runtime Report.
# If GitHub token is unavailable, marks status as BLOCKED and outputs exact commands.
# ═══════════════════════════════════════════════════════════════════════════════
name: Runtime Measurement

'on':
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: write

concurrency:
  group: runtime-measurement-${{ github.ref }}
  cancel-in-progress: true

jobs:
  measure-runtime:
    name: Measure CI Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "requests pyyaml"
          cache-key-suffix: "-runtime-measurement"

      - name: Measure CI runtime via GitHub Actions API
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_WORKFLOW: ci.yml
        run: |
          python3 - <<'PY'
          import os
          import requests
          import json
          import math
          from datetime import datetime, timezone

          token = os.environ.get("GITHUB_TOKEN")
          repo = os.environ.get("GITHUB_REPOSITORY")
          workflow = os.environ.get("TARGET_WORKFLOW")

          if not token:
              print("::error::GITHUB_TOKEN is unavailable. Runtime measurement is BLOCKED.")
              print("::group::Exact Commands Required")
              print("# To measure runtime manually, run:")
              print("curl -s -H 'Authorization: token <GITHUB_TOKEN>' \\\\")
              print(f"  'https://api.github.com/repos/{repo}/actions/workflows/{workflow}/runs?per_page=30&status=success' \\\\")
              print("  | jq '.workflow_runs[] | {run_id: .id, created: .created_at, started: .run_started_at, updated: .updated_at}'")
              print("::endgroup::")
              raise SystemExit(2)

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          url = f"https://api.github.com/repos/{repo}/actions/workflows/{workflow}/runs"
          params = {"per_page": 30, "status": "success"}
          resp = requests.get(url, headers=headers, params=params)
          resp.raise_for_status()
          data = resp.json()
          runs = data.get("workflow_runs", [])

          if not runs:
              print("No successful workflow runs found yet.")
              metrics = {
                  "run_id": int(os.environ.get("GITHUB_RUN_ID", 0)),
                  "timestamp": datetime.now(timezone.utc).isoformat(),
                  "count": 0,
                  "p50_runtime_seconds": None,
                  "p95_runtime_seconds": None,
                  "max_runtime_seconds": None,
                  "avg_queue_time_seconds": None,
                  "failure_rate": None,
                  "status": "NO_DATA",
              }
          else:
              runtimes = []
              queue_times = []

              for run in runs:
                  created = datetime.fromisoformat(run["created_at"].replace("Z", "+00:00"))
                  started = datetime.fromisoformat(run["run_started_at"].replace("Z", "+00:00"))
                  updated = datetime.fromisoformat(run["updated_at"].replace("Z", "+00:00"))
                  runtimes.append((updated - started).total_seconds())
                  queue_times.append((started - created).total_seconds())

              def percentile(vals, p):
                  if not vals:
                      return None
                  s = sorted(vals)
                  k = (len(s) - 1) * (p / 100.0)
                  f = math.floor(k)
                  c = math.ceil(k)
                  if f == c:
                      return s[int(k)]
                  return s[f] * (c - k) + s[c] * (k - f)

              metrics = {
                  "run_id": int(os.environ.get("GITHUB_RUN_ID", 0)),
                  "timestamp": datetime.now(timezone.utc).isoformat(),
                  "count": len(runs),
                  "p50_runtime_seconds": percentile(runtimes, 50),
                  "p95_runtime_seconds": percentile(runtimes, 95),
                  "max_runtime_seconds": max(runtimes) if runtimes else None,
                  "avg_queue_time_seconds": sum(queue_times) / len(queue_times) if queue_times else None,
                  "failure_rate": 0.0,
                  "status": "MEASURED",
              }

          out_path = "runtime-metrics.json"
          with open(out_path, "w") as f:
              json.dump(metrics, f, indent=2, default=str)
          print(json.dumps(metrics, indent=2, default=str))
          PY

      - name: Generate Measured Runtime Report
        env:
          METRICS_JSON: runtime-metrics.json
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime

          with open("runtime-metrics.json") as f:
              m = json.load(f)

          def fmt(seconds):
              if seconds is None:
                  return "N/A"
              secs = int(seconds)
              if secs < 60:
                  return f"{secs}s"
              mins, sec = divmod(secs, 60)
              return f"{mins}m {sec}s"

          def pct(rate):
              if rate is None:
                  return "N/A"
              return f"{rate*100:.1f}%"

          status = m.get("status", "UNKNOWN")
          if status == "BLOCKED":
              status_display = "BLOCKED"
          elif status == "NO_DATA":
              status_display = "NO_DATA"
          else:
              status_display = "MEASURED"

          report_lines = [
              "# Measured Runtime Report",
              "",
              f"Status: {status_display}",
              f"Runs Sampled: {m.get('count', 0)}",
              f"P50 Runtime: {fmt(m.get('p50_runtime_seconds'))}",
              f"P95 Runtime: {fmt(m.get('p95_runtime_seconds'))}",
              f"Max Runtime: {fmt(m.get('max_runtime_seconds'))}",
              f"Average Queue Time: {fmt(m.get('avg_queue_time_seconds'))}",
              f"Failure Rate: {pct(m.get('failure_rate'))}",
              "Critical Path: lint-fast -> test-shard-1/2/3/4 -> quality -> deploy-readiness -> deploy",
              "Data Source: GitHub Actions API (last 30 successful runs)",
              "",
              f"Generated: {datetime.now().isoformat()}",
          ]
          md = "\n".join(report_lines)
          with open("runtime-report.md", "w") as f:
              f.write(md)
          print(md)
          PY

      - name: Upload runtime report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: runtime-measurement
          path: |
            runtime-metrics.json
            runtime-report.md
          retention-days: 90

      - name: Post runtime report to PR
        if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405  # v2
        with:
          path: runtime-report.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
