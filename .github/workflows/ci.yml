name: CI Debug

on:
  push:
    branches:
      - main
      - master
      - cleanup/remove-dead-code
  pull_request:

jobs:
  sanity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Debug Info
        run: |
          echo "CI boot successful"
          pwd
          ls -la
          python --version || true
