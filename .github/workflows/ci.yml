name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, dev]

permissions:
  contents: read
  security-events: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  test:
    name: Test
    needs: lint
    uses: ./.github/workflows/test.yml

  django-check:
    name: Django Check
    needs: test
    uses: ./.github/workflows/django-check.yml

  hypothesis:
    name: Property Tests
    needs: django-check
    uses: ./.github/workflows/hypothesis.yml

  architecture:
    name: Architecture
    needs: hypothesis
    uses: ./.github/workflows/architecture.yml

  contract-tests:
    name: Contract Tests
    needs: hypothesis
    uses: ./.github/workflows/contract-tests.yml

  security:
    name: Security
    needs: [architecture, contract-tests]
    uses: ./.github/workflows/security.yml

  quality:
    name: Quality
    needs: security
    uses: ./.github/workflows/quality.yml
