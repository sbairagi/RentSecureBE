name: CI Pipeline

"on":
  push:
    branches: [main, master, cleanup/remove-dead-code]
  pull_request:
    branches: [main, master, dev, cleanup/remove-dead-code]

permissions:
  contents: read
  security-events: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  test:
    name: Test
    needs: lint
    uses: ./.github/workflows/test.yml

  django-check:
    name: Django Check
    needs: test
    uses: ./.github/workflows/django-check.yml

  hypothesis:
    name: Property Tests
    needs: django-check
    uses: ./.github/workflows/hypothesis.yml

  architecture:
    name: Architecture
    needs: hypothesis
    uses: ./.github/workflows/architecture.yml

  contract-tests:
    name: Contract Tests
    needs: hypothesis
    uses: ./.github/workflows/contract-tests.yml
