name: CI Pipeline (inline)

on:
  push:
    branches: [master]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint (${{ matrix.tool }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [pre-commit, black, ruff, pylint, mypy]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install per-tool deps
        run: |
          python -m pip install --upgrade pip
          case "${{ matrix.tool }}" in
            pre-commit)
              pip install pre-commit
              ;;
            black)
              pip install black
              ;;
            ruff)
              pip install ruff
              ;;
            pylint)
              pip install -r requirements.txt
              pip install pylint pylint-django
              ;;
            mypy)
              pip install -r requirements.txt
              pip install mypy django-stubs
              ;;
          esac
      - name: Run tool
        run: |
          case "${{ matrix.tool }}" in
            pre-commit)
              pre-commit run --all-files
              ;;
            black)
              python -m black --check .
              ;;
            ruff)
              python -m ruff check .
              ;;
            pylint)
              python -m pylint rentsecure_be ai_assistant core dashboard documents finance notification properties referral_and_earn smartbot
              ;;
            mypy)
              python -m mypy .
              ;;
          esac

  tests:
    name: Tests (${{ matrix.tool }})
    needs: lint
    if: always()
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [bandit, pytest, coverage]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rentsecure_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install
        run: |
          python -m pip install --upgrade pip
          case "${{ matrix.tool }}" in
            bandit)
              pip install bandit
              ;;
            pytest|coverage)
              pip install -r requirements.txt
              pip install coverage psycopg2-binary
              ;;
          esac
      - name: Run tool
        run: |
          case "${{ matrix.tool }}" in
            bandit)
              python -m bandit -r . -x .venv,venv,migrations,tests
              ;;
            pytest)
              python -m coverage run -m pytest
              python -m coverage xml
              ;;
            coverage)
              python -m coverage run -m pytest
              python -m coverage xml
              python -m coverage report --fail-under=90
              ;;
          esac

  security:
    name: Security (${{ matrix.tool }})
    needs: tests
    if: always()
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [semgrep, trivy, codeql]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install per-tool deps
        run: |
          python -m pip install --upgrade pip
          case "${{ matrix.tool }}" in
            semgrep)
              pip install semgrep
              ;;
            trivy)
              echo "trivy action will be used"
              ;;
            codeql)
              echo "codeql will initialize via action"
              ;;
          esac
      - name: Run tool
        run: |
          case "${{ matrix.tool }}" in
            semgrep)
              python -m semgrep --config p/ci --json --output semgrep-report.json || true
              ;;
            trivy)
              echo "Trivy scan via action"
              ;;
            codeql)
              echo "CodeQL will run via dedicated action step"
              ;;
          esac
      - name: Semgrep action wrapper
        if: matrix.tool == 'semgrep'
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci
          output: semgrep-report.sarif
      - name: Trivy action wrapper
        if: matrix.tool == 'trivy'
        uses: aquasecurity/trivy-action@v0.2.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
      - name: CodeQL action wrapper
        if: matrix.tool == 'codeql'
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: CodeQL autobuild
        if: matrix.tool == 'codeql'
        uses: github/codeql-action/autobuild@v3
      - name: CodeQL analyze
        if: matrix.tool == 'codeql'
        uses: github/codeql-action/analyze@v3
        with:
          output: codeql-results.sarif

  sonarcloud:
    name: SonarCloud
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage
      - name: Run SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@v1
        with:
          organization: sbairagi
          projectKey: sbairagi_RentSecureBE
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
