name: CI Pipeline

'on':
  push:
    branches: [main, master, dev, cleanup/remove-dead-code]
  pull_request:
    branches: [main, master, dev, cleanup/remove-dead-code]
  merge_group:

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-fast:
    name: Stage 1 │ Lint Fast
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  test-shard-1:
    name: Stage 2 │ Test Shard 1/4
    needs: [lint-fast]
    uses: ./.github/workflows/test.yml
    with:
      shard: 1
    secrets: inherit

  test-shard-2:
    name: Stage 2 │ Test Shard 2/4
    needs: [lint-fast]
    uses: ./.github/workflows/test.yml
    with:
      shard: 2
    secrets: inherit

  test-shard-3:
    name: Stage 2 │ Test Shard 3/4
    needs: [lint-fast]
    uses: ./.github/workflows/test.yml
    with:
      shard: 3
    secrets: inherit

  test-shard-4:
    name: Stage 2 │ Test Shard 4/4
    needs: [lint-fast]
    uses: ./.github/workflows/test.yml
    with:
      shard: 4
    secrets: inherit

  shard-validation:
    name: Stage 2 │ Shard Distribution Validation
    timeout-minutes: 15
    needs: [test-shard-1, test-shard-2, test-shard-3, test-shard-4]
    runs-on: ubuntu-latest
    steps:
      - name: Download shard metrics
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: shard-metrics-*
          path: shard-metrics
          merge-multiple: false
      - name: Validate shard distribution
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          metrics_dir = Path('shard-metrics')
          files = sorted(metrics_dir.glob('*/shard-metrics.json'))
          if len(files) != 4:
              print(f'ERROR: expected 4 shard metrics files, found {len(files)}')
              for path in files:
                  print(path)
              sys.exit(1)

          shards = []
          for path in files:
              with path.open() as fh:
                  payload = json.load(fh)
              shard = payload.get('shard')
              if shard is None:
                  raise SystemExit(f'{path} is missing a shard id')
              shards.append(int(shard))

          if sorted(shards) != [1, 2, 3, 4]:
              raise SystemExit(f'Unexpected shard distribution: {shards}')

          print('Shard distribution validation passed:', shards)
          PY

  contract-tests:
    name: Stage 2 │ Contract Tests
    needs: [lint-fast]
    uses: ./.github/workflows/contract-tests.yml
    secrets: inherit

  django-check:
    name: Stage 2 │ Django Check
    needs: [lint-fast]
    uses: ./.github/workflows/django-check.yml
    secrets: inherit

  architecture:
    name: Stage 2 │ Architecture
    needs: [lint-fast]
    uses: ./.github/workflows/architecture.yml
    secrets: inherit

  security-fast:
    name: Stage 2 │ Security Fast
    needs: [lint-fast]
    uses: ./.github/workflows/security.yml
    with:
      run_dependency_review: ${{ github.event_name == 'pull_request' }}
    secrets: inherit

  mutation-smoke:
    name: Stage 2 │ Mutation Smoke
    needs: [lint-fast]
    uses: ./.github/workflows/mutation.yml
    with:
      mutation_mode: smoke
    secrets: inherit

  migration-rollback-validation:
    name: Stage 2 │ Migration Rollback Validation
    needs: [lint-fast]
    uses: ./.github/workflows/migration-rollback.yml
    secrets: inherit

  hypothesis-fast:
    name: Stage 2 │ Hypothesis Fast
    needs: [lint-fast]
    uses: ./.github/workflows/hypothesis.yml
    with:
      hypothesis_mode: smoke
    secrets: inherit

  quality:
    name: Stage 3 │ Quality
    needs: [test-shard-1, test-shard-2, test-shard-3, test-shard-4, shard-validation, contract-tests, architecture]
    uses: ./.github/workflows/quality.yml
    secrets: inherit

  branch-protection:
    name: Stage 4 │ Branch Protection
    needs: [quality, security-fast, django-check]
    uses: ./.github/workflows/branch-protection.yml
    secrets: inherit

  deploy-readiness:
    name: Stage 4 │ Deploy Readiness
    needs: [quality, security-fast, django-check, branch-protection]
    uses: ./.github/workflows/deploy-readiness.yml
    secrets: inherit

  deploy:
    name: Stage 5 │ Deploy
    needs: [deploy-readiness]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
