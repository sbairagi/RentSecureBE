name: CI Pipeline

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, dev]

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  test:
    name: Test
    needs: lint
    uses: ./.github/workflows/test.yml

  security:
    name: Security
    needs: test
    uses: ./.github/workflows/security.yml

  quality:
    name: Quality
    needs: security
    uses: ./.github/workflows/quality.yml
