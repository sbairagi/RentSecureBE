name: CI Pipeline

"on":
  push:
    branches: [main, master, cleanup/remove-dead-code]
  pull_request:
    branches: [main, master, dev, cleanup/remove-dead-code]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Code Quality
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  security:
    name: Security & Supply Chain
    needs: lint
    uses: ./.github/workflows/security.yml
    secrets: inherit

  test:
    name: Test Coverage
    needs: security
    uses: ./.github/workflows/test.yml
    secrets: inherit

  hypothesis:
    name: Hypothesis Property Tests
    needs: security
    uses: ./.github/workflows/hypothesis.yml
    secrets: inherit

  quality:
    name: Quality
    needs: test
    uses: ./.github/workflows/quality.yml
    secrets: inherit

  performance:
    name: Performance
    needs: security
    uses: ./.github/workflows/performance.yml
    secrets: inherit

  mutation:
    name: Mutation
    needs: security
    uses: ./.github/workflows/mutation.yml
    secrets: inherit

  django-check:
    name: Django Management Checks
    needs: security
    uses: ./.github/workflows/django-check.yml
    secrets: inherit

  architecture:
    name: Architecture & Contracts
    needs: django-check
    uses: ./.github/workflows/architecture.yml
    secrets: inherit

  contract-tests:
    name: Contract Tests
    needs: architecture
    uses: ./.github/workflows/contract-tests.yml
    secrets: inherit

  deploy-readiness:
    name: Deploy Readiness
    needs: [contract-tests, performance, mutation, quality]
    uses: ./.github/workflows/deploy-readiness.yml
    secrets: inherit
