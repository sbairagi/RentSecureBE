name: CI Pipeline

on:
  push:
    branches: [main, master, cleanup/remove-dead-code]
  pull_request:
    branches: [main, master, dev, cleanup/remove-dead-code]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  test:
    name: Test
    needs: lint
    uses: ./.github/workflows/test.yml
    secrets: inherit

  django-check:
    name: Django Check
    needs: test
    uses: ./.github/workflows/django-check.yml
    secrets: inherit

  hypothesis:
    name: Property Tests
    needs: django-check
    uses: ./.github/workflows/hypothesis.yml
    secrets: inherit

  architecture:
    name: Architecture
    needs: hypothesis
    uses: ./.github/workflows/architecture.yml
    secrets: inherit

  contract-tests:
    name: Contract Tests
    needs: hypothesis
    uses: ./.github/workflows/contract-tests.yml
    secrets: inherit

  security:
    name: Security
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/security.yml
    secrets: inherit

  quality:
    name: Quality
    needs: security
    uses: ./.github/workflows/quality.yml
    secrets: inherit

  performance:
    name: Performance
    needs: security
    uses: ./.github/workflows/performance.yml
    secrets: inherit

  mutation:
    name: Mutation
    needs: security
    uses: ./.github/workflows/mutation.yml
    secrets: inherit

  deploy-readiness:
    name: Deploy Readiness
    needs: [performance, mutation, quality]
    uses: ./.github/workflows/deploy-readiness.yml
    secrets: inherit
