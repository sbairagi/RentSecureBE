name: CI Pipeline

'on':
  push:
    branches: [main, master, dev, cleanup/remove-dead-code]
  pull_request:
    branches: [main, master, dev, cleanup/remove-dead-code]
  merge_group:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-fast:
    name: Stage 1 │ Lint Fast
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  test-shard-1:
    name: Stage 2 │ Test Shard 1/4
    needs: [lint-fast]
    uses: ./.github/workflows/test.yml
    with:
      shard: 1
    secrets: inherit

  test-shard-2:
    name: Stage 2 │ Test Shard 2/4
    needs: [lint-fast]
    uses: ./.github/workflows/test.yml
    with:
      shard: 2
    secrets: inherit

  test-shard-3:
    name: Stage 2 │ Test Shard 3/4
    needs: [lint-fast]
    uses: ./.github/workflows/test.yml
    with:
      shard: 3
    secrets: inherit

  test-shard-4:
    name: Stage 2 │ Test Shard 4/4
    needs: [lint-fast]
    uses: ./.github/workflows/test.yml
    with:
      shard: 4
    secrets: inherit

  contract-tests:
    name: Stage 2 │ Contract Tests
    needs: [lint-fast]
    uses: ./.github/workflows/contract-tests.yml
    secrets: inherit

  django-check:
    name: Stage 2 │ Django Check
    needs: [lint-fast]
    uses: ./.github/workflows/django-check.yml
    secrets: inherit

  architecture:
    name: Stage 2 │ Architecture
    needs: [lint-fast]
    uses: ./.github/workflows/architecture.yml
    secrets: inherit

  security-fast:
    name: Stage 2 │ Security Fast
    needs: [lint-fast]
    uses: ./.github/workflows/security.yml
    with:
      run_dependency_review: ${{ github.event_name == 'pull_request' }}
    secrets: inherit

  mutation-smoke:
    name: Stage 2 │ Mutation Smoke
    needs: [lint-fast]
    uses: ./.github/workflows/mutation.yml
    with:
      mutation_mode: smoke
    secrets: inherit

  hypothesis-fast:
    name: Stage 2 │ Hypothesis Fast
    needs: [lint-fast]
    uses: ./.github/workflows/hypothesis.yml
    with:
      hypothesis_mode: smoke
    secrets: inherit

  quality:
    name: Stage 3 │ Quality
    needs: [test-shard-1, test-shard-2, test-shard-3, test-shard-4, contract-tests, architecture]
    uses: ./.github/workflows/quality.yml
    secrets: inherit

  deploy-readiness:
    name: Stage 4 │ Deploy Readiness
    needs: [quality, security-fast, django-check]
    uses: ./.github/workflows/deploy-readiness.yml
    secrets: inherit

  deploy:
    name: Stage 5 │ Deploy
    needs: [deploy-readiness]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
