name: CI Pipeline

on:
  push:
    branches: [main, master, cleanup/remove-dead-code]
  pull_request:
    branches: [main, master, dev, cleanup/remove-dead-code]

permissions:
  contents: read
  security-events: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security
    uses: ./.github/workflows/security.yml
    secrets: inherit
