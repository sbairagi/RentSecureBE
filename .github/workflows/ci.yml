name: CI Pipeline - Minimal Test

"on":
  push:
    branches: [main, cleanup/remove-dead-code]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Smoke
        run: echo "ci.yml starts"
