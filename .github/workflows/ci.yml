name: CI Pipeline (inline)

on:
  push:
    branches: [master]
  pull_request:
    branches: [main, dev]

jobs:
  black:
    name: Black
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install black
      - name: Run Black
        run: python -m black --check .

  ruff:
    name: Ruff
    needs: black
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff
        run: python -m ruff check .

  pylint:
    name: Pylint
    needs: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pylint pylint-django
      - name: Run Pylint
        run: python -m pylint rentsecure_be ai_assistant core dashboard documents finance notification properties referral_and_earn smartbot

  mypy:
    name: Mypy
    needs: pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install mypy
      - name: Run Mypy
        run: python -m mypy .

  bandit:
    name: Bandit
    needs: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install bandit
      - name: Run Bandit
        run: python -m bandit -r . -x .venv,venv,migrations,tests

  pytest:
    name: Pytest
    needs: bandit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rentsecure_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage psycopg2-binary
      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest
          python -m coverage xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifact
          path: |
            coverage.xml
            .coverage

  coverage:
    name: Coverage
    needs: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-artifact
      - name: Check coverage threshold
        run: |
          python -m pip install --upgrade pip
          pip install coverage
          python -m coverage report --fail-under=90
          python -m coverage xml

  semgrep:
    name: Semgrep
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci
          output: semgrep-report.sarif

  trivy:
    name: Trivy
    needs: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.2.0
        with:
          scan-type: fs
          scan-ref: .
          format: table

  codeql:
    name: CodeQL
    needs: trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: codeql-results.sarif

  sonarcloud:
    name: SonarCloud
    needs: codeql
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage
      - name: Run SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@v1
        with:
          organization: sbairagi
          projectKey: sbairagi_RentSecureBE
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
