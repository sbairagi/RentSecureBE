# ═══════════════════════════════════════════════════════════════════════════════
# ROLLBACK: Production Rollback Workflow
# ═══════════════════════════════════════════════════════════════════════════════
# Triggered manually via workflow_dispatch with a target SHA to rollback to.
# Validates the target SHA, re-deploys the previous version, and generates
# a rollback validation report.
# ═══════════════════════════════════════════════════════════════════════════════
name: Rollback

'on':
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: "Commit SHA to rollback to (target deployment SHA)"
        required: true
        type: string
      reason:
        description: "Reason for rollback"
        required: true
        type: string
      notify_team:
        description: "Send notification to team channel"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  validate-target:
    name: Validate Rollback Target
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Validate target SHA exists
        run: |
          git cat-file -t ${{ github.event.inputs.rollback_sha }} >/dev/null 2>&1 \
            && echo "Valid SHA" \
            || (echo "Invalid SHA" && exit 1)
      - name: Verify deployment artifacts for target
        run: |
          echo "Target SHA: ${{ github.event.inputs.rollback_sha }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          git log --oneline -1 ${{ github.event.inputs.rollback_sha }}

  rollback-deploy:
    name: Execute Rollback Deploy
    runs-on: ubuntu-latest
    needs: [validate-target]
    timeout-minutes: 30
    steps:
      - name: Checkout target SHA
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.inputs.rollback_sha }}
      - name: Deploy rollback to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/rentsecure
            git fetch origin
            git checkout ${{ github.event.inputs.rollback_sha }}
            docker compose up -d --build
      - name: Create Sentry release for rollback
        if: always()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          export RELEASE=${{ github.event.inputs.rollback_sha }}
          ./sentry-cli releases new --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" "$RELEASE"
          ./sentry-cli releases set-commits --auto --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" "$RELEASE"
          ./sentry-cli releases finalize --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" "$RELEASE"
          ./sentry-cli releases deploys --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" "$RELEASE" new -e production

  rollback-validation:
    name: Rollback Validation Report
    runs-on: ubuntu-latest
    needs: [rollback-deploy]
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate deployment health
        run: |
          curl -f https://${{ secrets.EC2_HOST }}/api/health/ || (echo "Health check failed" && exit 1)
      - name: Generate rollback report
        run: |
          cat > rollback-report.md << EOF
          # Rollback Validation Report

          | Field | Value |
          |-------|-------|
          | Target SHA | `${{ github.event.inputs.rollback_sha }}` |
          | Reason | ${{ github.event.inputs.reason }} |
          | Triggered By | ${{ github.actor }} |
          | Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |
          | Health Check | ✅ Passed |

          ## Rollback Validation Steps

          - [x] Target SHA validated
          - [x] Deployment executed
          - [x] Post-deploy health check passed
          EOF
      - name: Upload rollback report
        uses: actions/upload-artifact@v4
        with:
          name: rollback-report
          path: rollback-report.md
          retention-days: 90
      - name: Comment rollback result on incident issue (if any)
        if: always()
        run: |
          echo "Rollback completed. See artifacts for details."
