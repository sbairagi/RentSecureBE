name: Quality

"on":
  workflow_call:

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Harden Runner
        uses: step-security/harden-runner@v2
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-artifact

      - name: Validate coverage.xml exists
        run: |
          if [ ! -f coverage.xml ]; then
            echo "ERROR: coverage.xml not found. Pytest job must generate it."
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: sbairagi
          SONAR_PROJECT_KEY: sbairagi_RentSecureBE
        with:
          projectProperties: |
            sonar.host.url=https://sonarcloud.io
            sonar.organization=${{ env.SONAR_ORGANIZATION }}
            sonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            sonar.qualitygate.wait=true
            sonar.qualitygate.timeout=300
            sonar.coverageReportPaths=coverage.xml
            sonar.python.coverage.reportPaths=coverage.xml
            sonar.sources=.
            sonar.exclusions=**/migrations/**,**/__pycache__/**,**/.venv/**,**/venv/**,**/*.pyc,**/db.sqlite3,**/.github/**,**/htmlcov/**,**/coverage.xml,**/*.md,**/requirements*.txt,**/.env.example
            sonar.tests=.
            sonar.test.inclusions=**/test_*.py,**/tests.py,**/*_tests.py,**/tests/**/*.py
            sonar.python.unitTest.source=.
            sonar.pullrequest.key=${{ github.event.pull_request.number }}
            sonar.pullrequest.branch=${{ github.head_ref }}
            sonar.pullrequest.base=${{ github.base_ref }}
