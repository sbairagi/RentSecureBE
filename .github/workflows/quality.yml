# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 7: Quality Gate (SonarCloud)
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: SonarCloud analysis with quality gate check (wait for gate status)
# ═══════════════════════════════════════════════════════════════════════════════
name: Quality

'on':
  workflow_call:

permissions:
  contents: read
  security-events: write

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: Stage 7 │ SonarCloud Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
            api.sonarcloud.io:443
            sonarcloud.io:443
            binaries.sonarsource.com:443
            scanner.sonarcloud.io:443

      - name: Download coverage shards
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: coverage-shard-1
          path: coverage-artifacts
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: coverage-shard-2
          path: coverage-artifacts
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: coverage-shard-3
          path: coverage-artifacts
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: coverage-shard-4
          path: coverage-artifacts
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "coverage"
          cache-key-suffix: "-quality"

      - name: Combine coverage and generate XML
        shell: bash
        run: |
          set -euo pipefail
          cd coverage-artifacts
          mapfile -t coverage_files < <(find . -name '.coverage.*' -type f | sort)
          if [ ${#coverage_files[@]} -eq 0 ]; then
            echo "ERROR: no coverage shard files found in coverage-artifacts."
            ls -la
            exit 1
          fi
          python -m coverage combine "${coverage_files[@]}"
          python -m coverage xml -o coverage.xml
          mv coverage.xml ../coverage.xml
      - name: Validate coverage.xml exists
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f coverage.xml ]; then
            echo "ERROR: coverage.xml not found after combining shards."
            ls -la
            exit 1
          fi
      - name: Validate coverage.xml integrity
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import sys
          from xml.etree import ElementTree as ET

          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          if root.tag != 'coverage':
              raise SystemExit('coverage.xml does not contain a coverage root element')
          if root.get('line-rate') is None:
              raise SystemExit('coverage.xml is missing line-rate metadata')
          print('coverage.xml parsed successfully and contains coverage metadata.')
          PY

      - name: Run SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8  # v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=sbairagi
            -Dsonar.projectKey=sbairagi_RentSecureBE
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=.
            -Dsonar.exclusions=**/migrations/**,**/__pycache__/**,**/.venv/**,**/venv/**,**/*.pyc,**/db.sqlite3,**/.github/**,**/htmlcov/**,**/coverage.xml,**/*.md,**/requirements*.txt,**/.env.example
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/test_*.py,**/tests.py,**/*_tests.py,**/tests/**/*.py
            -Dsonar.python.unitTest.source=.
      - name: Enforce SonarCloud quality gate result
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: sbairagi_RentSecureBE
        run: |
          set -euo pipefail
          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "ERROR: SONAR_TOKEN is not configured."
            exit 1
          fi
          python - <<'PY'
          import base64
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request

          token = os.environ['SONAR_TOKEN']
          project_key = os.environ['SONAR_PROJECT_KEY']
          url = f"https://sonarcloud.io/api/qualitygates/project_status?projectKey={urllib.parse.quote(project_key)}"
          req = urllib.request.Request(
              url,
              headers={"Authorization": f"Basic {base64.b64encode(f'{token}:'.encode()).decode()}"},
          )
          with urllib.request.urlopen(req, timeout=60) as response:
              payload = json.load(response)
          project_status = payload.get('projectStatus', {})
          status = project_status.get('status')
          print(json.dumps(project_status, indent=2))
          if status != 'OK':
              sys.exit(f"SonarCloud quality gate failed with status: {status}")
          PY
