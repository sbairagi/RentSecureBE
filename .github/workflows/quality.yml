# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 7: Quality Gate (SonarCloud)
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: SonarCloud analysis with quality gate check (wait for gate status)
# ═══════════════════════════════════════════════════════════════════════════════
name: Quality

'on':
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  sonarcloud:
    name: Stage 7 │ SonarCloud Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            objects.githubusercontent.com:443
            api.sonarcloud.io:443
            sonarcloud.io:443

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-artifact

      - name: Validate coverage.xml exists
        run: |
          if [ ! -f coverage.xml ]; then
            echo "ERROR: coverage.xml not found. Pytest job must generate it."
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@v5.0.0
        with:
          args: |
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=sbairagi
            -Dsonar.projectKey=sbairagi_RentSecureBE
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
            -Dsonar.coverageReportPaths=coverage.xml
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=.
            -Dsonar.exclusions=**/migrations/**,**/__pycache__/**,**/.venv/**,**/venv/**,**/*.pyc,**/db.sqlite3,**/.github/**,**/htmlcov/**,**/coverage.xml,**/*.md,**/requirements*.txt,**/.env.example
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/test_*.py,**/tests.py,**/*_tests.py,**/tests/**/*.py
            -Dsonar.python.unitTest.source=.
