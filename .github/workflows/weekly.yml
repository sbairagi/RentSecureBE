# ═══════════════════════════════════════════════════════════════════════════════
# WEEKLY: Exhaustive Validation Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
# Schedule: 0 3 * * 0
# Single weekly orchestrator for mutation, hypothesis, SBOM, benchmark, load-test.
# Never blocks PR merges.
# ═══════════════════════════════════════════════════════════════════════════════
name: Weekly Exhaustive Validation

'on':
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

concurrency:
  group: weekly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  exhaustive-mutation:
    name: Weekly │ Exhaustive Mutation Testing
    uses: ./.github/workflows/mutation.yml
    with:
      mutation_mode: exhaustive
    secrets: inherit

  stress-property-testing:
    name: Weekly │ Stress Property Testing
    uses: ./.github/workflows/hypothesis.yml
    with:
      hypothesis_mode: stress
    secrets: inherit

  sbom:
    name: Weekly │ SBOM
    uses: ./.github/workflows/sbom.yml
    with:
      artifact_retention_days: 90
    secrets: inherit

  benchmark:
    name: Weekly │ Benchmark
    needs: sbom
    uses: ./.github/workflows/benchmark.yml
    secrets: inherit

  load-test:
    name: Weekly │ Load Test
    needs: benchmark
    uses: ./.github/workflows/load-test.yml
    secrets: inherit
