# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 6: Security & Supply Chain (Deep Nightly / Main Branch)
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: CodeQL Advanced Analysis, OpenSSF Scorecard, Dependency Review
# Triggers: nightly schedule + push to main/master
# Never runs on PRs (kept lightweight via security.yml).
# ═══════════════════════════════════════════════════════════════════════════════
name: Security Deep

'on':
  workflow_call:
  push:
    branches:
      - main
      - master
  pull_request:
    branches: [main, master, dev]
  merge_group: {}
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: security-deep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: Stage 6a │ CodeQL (Advanced Python Analysis)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
        with:
          languages: python
          queries: security-extended,security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
        with:
          category: "/language:python"
          upload: true

  scorecard:
    name: Stage 6b │ OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@13ec8c77e8a5dae7e0a0d47bde3e3004df15d34f  # v2.0.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard SARIF to GitHub Security
        if: ${{ !github.event.pull_request || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
        continue-on-error: true
        with:
          sarif_file: scorecard-results.sarif

  dependency-review:
    name: Stage 6c │ Dependency Review (Nightly)
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_call' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Verify Dependency Graph is available
        id: dep-graph-check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/dependency-graph/snapshots")
          echo "dependency_graph_status=${status}" >> $GITHUB_OUTPUT
          if [ "${status}" == "404" ]; then
            echo "Dependency Graph is not available for this repository. Skipping Dependency Review."
            exit 0
          elif [ "${status}" != "200" ]; then
            echo "::warning::Unexpected status ${status} from dependency-graph API. Attempting Dependency Review anyway."
          fi
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-dep-review-nightly"
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        if: ${{ steps.dep-graph-check.outputs.dependency_graph_status != '404' }}
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, LGPL-3.0

  trivy-deep:
    name: Stage 6d │ Trivy Deep Scan (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            ghcr.io:443
            mirror.gcr.io:443
            get.trivy.dev:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - name: Run Trivy deep filesystem scan
        id: trivy-deep
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: 'sarif'
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          skip-dirs: .venv,venv,build,dist,node_modules,.kilo,htmlcov
          vuln-type: 'os,library'
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db
      - name: Verify Trivy SARIF output exists
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f trivy-results.sarif ]; then
            echo "::error::Trivy deep scan did not produce trivy-results.sarif"
            echo "::error::Scan step id=trivy-deep outcome=${{ steps.trivy-deep.outcome }} conclusion=${{ steps.trivy-deep.conclusion }}"
            exit 1
          fi
      - name: Upload Trivy SARIF to GitHub Security
        if: ${{ !github.event.pull_request || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
