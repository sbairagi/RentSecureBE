# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 6: Security & Supply Chain (Deep Nightly / Main Branch)
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: CodeQL Advanced Analysis, OpenSSF Scorecard, Dependency Review
# Triggers: nightly schedule + push to main/master
# Never runs on PRs (kept lightweight via security.yml).
# ═══════════════════════════════════════════════════════════════════════════════
name: Security Deep

'on':
  workflow_call:
  push:
    branches:
      - main
      - master
  pull_request:
    branches: [main, master, dev]
  merge_group: {}
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: security-deep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: Stage 6a │ CodeQL (Advanced Python Analysis)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended,security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
          upload: true

  scorecard:
    name: Stage 6b │ OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.0.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard SARIF to GitHub Security
        if: ${{ !github.event.pull_request || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: scorecard-results.sarif

  dependency-review:
    name: Stage 6c │ Dependency Review (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-dep-review-nightly"
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, LGPL-3.0

  trivy-deep:
    name: Stage 6d │ Trivy Deep Scan (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - name: Run Trivy deep filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: 'sarif'
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          skip-dirs: .venv,venv,build,dist,node_modules,.kilo,htmlcov
          vuln-type: 'os,library'
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db
      - name: Upload Trivy SARIF to GitHub Security
        if: ${{ !github.event.pull_request || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
