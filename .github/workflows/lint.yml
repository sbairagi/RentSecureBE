# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 1: Setup & Prepare        │ STAGE 2: Code Quality (Fast-Fail)
# ═══════════════════════════════════════════════════════════════════════════════
# Jobs: pre-commit, black, ruff, pylint, mypy (strict), vulture (dead code)
# ═══════════════════════════════════════════════════════════════════════════════
name: Lint

on:
  workflow_call:

jobs:
  pre-commit:
    name: Stage 1 │ Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
      - name: Run Pre-commit
        run: pre-commit run --all-files

  black:
    name: Stage 2a │ Black Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install black
      - name: Run Black
        run: python -m black --check .

  ruff:
    name: Stage 2b │ Ruff Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff
        run: python -m ruff check .

  pylint:
    name: Stage 2c │ Pylint Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install setuptools pylint pylint-django
      - name: Run Pylint
        env:
          PYTHONPATH: ${{ github.workspace }}
          SKIP_DJANGO_SIGNALS: "1"
        run: python -m pylint rentsecure_be ai_assistant core dashboard documents finance notification properties referral_and_earn smartbot

  mypy:
    name: Stage 2d │ Mypy (Strict Typing)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install setuptools
          pip install 'mypy==1.13.0'
          pip install types-requests types-python-dateutil types-openpyxl
          pip install 'django-stubs==4.2.7' 'django-stubs-ext==4.2.7' 'djangorestframework-stubs==3.16.9' --no-deps
      - name: Verify mypy configuration
        run: python -m mypy --show-error-codes --pretty --show-column-numbers --show-error-context .
      - name: Run Mypy
        run: python -m mypy --config-file=mypy.ini .

  vulture:
    name: Stage 2e │ Vulture (Dead Code Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install Vulture
        run: |
          python -m pip install --upgrade pip
          pip install vulture
      - name: Run Vulture (dead code detection) — advisory report, non-blocking
        run: |
          python -m vulture \
            --exclude .venv,venv,build,dist,migrations,__pycache__,.pytest_cache,.github,.kilo \
            --exclude properties/_legacy,properties/refactored_models_combined.py,properties/original_models.py \
            --exclude properties/signals,core/signals.py,referral_and_earn/signals.py \
            --min-confidence 80 \
            rentsecure_be core properties finance notification documents smartbot referral_and_earn ai_assistant dashboard \
            2>&1 | tee vulture-report.txt || true
