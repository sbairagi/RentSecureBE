name: Deploy Readiness

"on":
  workflow_call:

jobs:
  deploy-readiness:
    name: Deploy Readiness Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      USE_SQLITE: "True"
      SECRET_KEY: "test-secret-key-deploy-readiness-2026-abcdefghijklmnopqrstuvwxyz1234567890"
      DEBUG: "False"
      DJANGO_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
            docker.io:443
            registry-1.docker.io:443

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Django system check
        run: python manage.py check --verbosity=2 --fail-level ERROR

      - name: Django deploy check
        run: python manage.py check --deploy --verbosity=2 --fail-level WARNING

      - name: Validate migrations apply on clean database
        run: |
          rm -f db.sqlite3
          python manage.py migrate --run-syncdb --verbosity=2
          echo "All migrations applied successfully on clean database."

      - name: Validate collectstatic works
        run: python manage.py collectstatic --noinput --verbosity=0
