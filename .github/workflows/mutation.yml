name: Mutation Testing

on:
  workflow_call:
  schedule:
    - cron: '0 2 * * *'  # Nightly at 02:00 UTC
  pull_request:
    paths:
      - 'properties/**/*.py'
      - 'core/**/*.py'
      - 'finance/**/*.py'
      - 'smartbot/**/*.py'
      - 'notification/**/*.py'
      - 'documents/**/*.py'

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutmut:
    name: Mutation Testing (mutmut)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      USE_SQLITE: "True"
      SECRET_KEY: test-secret-key-mutmut-2026
      DEBUG: "False"
      DJANGO_ENV: test
      MUTMUT_CACHE_DIR: .mutmut-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
            docker.io:443
            registry-1.docker.io:443
            production.cloudflare.docker.com:443

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache mutmut results
        uses: actions/cache@v4
        with:
          path: .mutmut-cache
          key: ${{ runner.os }}-mutmut-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-mutmut-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary mutmut==3.6.0

      - name: Run migrations
        run: python manage.py migrate --run-syncdb --verbosity=1

      - name: Configure mutmut paths
        run: |
          mkdir -p .mutmut
          cat > .mutmut/config.ini << 'EOF'
          [mutmut]
          paths_to_mutate = core/models.py,properties/models/,properties/services/,properties/utils/,finance/models.py,smartbot/services/,notification/services/,properties/feature_enforcer.py
          backups = .mutmut-backups
          runner = python -m pytest --no-header -q --tb=short --randomly-seed=last
          tests_dir = .
          dict_paths =
          worker = 4
          show_progress = True
          EOF

      - name: Run mutmut
        run: |
          python -m mutmut run --paths-to-mutate=core/models.py,properties/models/,properties/services/,properties/utils/,finance/models.py,smartbot/services/,notification/services/,properties/feature_enforcer.py \
            --runner="python -m pytest --no-header -q --tb=short --randomly-seed=last -x" \
            --worker=4 \
            --simple-output 2>&1 | tee mutmut-output.txt

      - name: Report mutmut results
        run: |
          python -m mutmut report || true

      - name: Check mutation score
        run: |
          python -m mutmut report 2>&1 | head -60 || true
          echo "Mutation score report generated (advisory — non-blocking)."

      - name: Upload mutmut results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-results
          path: |
            mutmut-output.txt
            .mutmut-cache/
          retention-days: 30
          compression-level: 1
