# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 4: Django System & Migration Checks
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: Django system check, deploy check, migration validation, rollback
# ═══════════════════════════════════════════════════════════════════════════════
name: Django Check

'on':
  workflow_call:

permissions:
  contents: read

concurrency:
  group: django-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  django-check:
    name: Stage 4 │ Django System & Migration Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      USE_SQLITE: "True"
      SECRET_KEY: "test-secret-key-django-check-2026"
      DEBUG: "False"
      DJANGO_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "psycopg2-binary"
          cache-key-suffix: "-django-check"
      - name: Django system check
        run: python manage.py check --verbosity=2 --fail-level ERROR
      - name: Django deploy check
        run: python manage.py check --deploy --verbosity=2 --fail-level WARNING
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run --verbosity=2
      - name: Validate migrations apply on clean database
        run: |
          rm -f db.sqlite3
          python manage.py migrate --run-syncdb --verbosity=2
          echo "All migrations applied successfully on clean database."

  migration-rollback:
    name: Stage 4b │ Migration Rollback Validation
    runs-on: ubuntu-latest
    needs: django-check
    timeout-minutes: 15
    env:
      USE_SQLITE: "True"
      SECRET_KEY: test-secret-key-migration-rollback-2026
      DEBUG: "False"
      DJANGO_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "psycopg2-binary"
          cache-key-suffix: "-migration-rollback"
      - name: Discover app migrations
        id: discover
        run: |
          echo "=== properties ==="
          find properties/migrations -name '*.py' ! -name '__init__' ! -name '__pycache__*' | sort
          echo "=== core ==="
          find core/migrations -name '*.py' ! -name '__init__' ! -name '__pycache__*' | sort
          echo "=== finance ==="
          find finance/migrations -name '*.py' ! -name '__init__' ! -name '__pycache__*' | sort
          echo "=== smartbot ==="
          find smartbot/migrations -name '*.py' ! -name '__init__' ! -name '__pycache__*' | sort
          echo "=== documents ==="
          find documents/migrations -name '*.py' ! -name '__init__' ! -name '__pycache__*' | sort
          echo "=== notification ==="
          find notification/migrations -name '*.py' ! -name '__init__' ! -name '__pycache__*' | sort
          echo "=== referral_and_earn ==="
          find referral_and_earn/migrations -name '*.py' ! -name '__init__' ! -name '__pycache__*' | sort
      - name: Run all migrations forward
        run: python manage.py migrate --run-syncdb --verbosity=2
      - name: Identify last migration per app and test rollback
        run: |
          python - <<'EOF'
          import subprocess, sys, os
          apps = ["properties", "core", "finance", "smartbot", "documents", "notification", "referral_and_earn"]
          os.environ.setdefault("DJANGO_SETTINGS_MODULE", "rentsecure_be.settings")
          import django
          django.setup()
          from django.core.management import call_command
          for app in apps:
              migrations_dir = os.path.join(app, "migrations")
              if not os.path.isdir(migrations_dir):
                  print(f"[SKIP] {app}: no migrations dir")
                  continue
              migrations = sorted([
                  f.replace(".py", "")
                  for f in os.listdir(migrations_dir)
                  if f.endswith(".py") and f != "__init__.py" and not f.startswith("__pycache__")
              ])
              if not migrations:
                  print(f"[SKIP] {app}: no migration files")
                  continue
              last_migration = migrations[-1]
              if len(migrations) == 1:
                  print(f"[SKIP] {app}: only one migration ({last_migration}), rollback would be to zero")
                  continue
              target = migrations[-2]
              print(f"[TEST] {app}: rolling back from {last_migration} -> {target}")
              try:
                  call_command("migrate", app, target, verbosity=1)
                  print(f"[PASS] {app}: rollback to {target} succeeded")
                  call_command("migrate", app, verbosity=0)
                  print(f"[RESTORE] {app}: re-applied forward migrations")
              except Exception as e:
                  print(f"[FAIL] {app}: rollback FAILED - {e}")
                  sys.exit(1)
          print("\nAll rollback validations passed.")
          EOF
