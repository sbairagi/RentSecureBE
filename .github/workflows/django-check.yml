# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 4: Django System & Migration Checks
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: Django system check, deploy check, migration validation
# ═══════════════════════════════════════════════════════════════════════════════
name: Django Check

'on':
  workflow_call:

permissions:
  contents: read

concurrency:
  group: django-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  django-check:
    name: Stage 4 │ Django System & Migration Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      USE_SQLITE: "True"
      SECRET_KEY: "test-secret-key-django-check-2026-abcdefghijklmnopqrstuvwxyz1234567890"
      DEBUG: "False"
      DJANGO_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "psycopg2-binary"
          cache-key-suffix: "-django-check"
      - name: Django system check
        run: python manage.py check --verbosity=2 --fail-level ERROR
      - name: Django deploy check
        run: python manage.py check --deploy --verbosity=2 --fail-level WARNING
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run --verbosity=2
      - name: Validate migrations apply on clean database
        run: |
          rm -f db.sqlite3
          python manage.py migrate --run-syncdb --verbosity=2
          echo "All migrations applied successfully on clean database."
