# ═══════════════════════════════════════════════════════════════════════════════
# MIGRATION ROLLBACK VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════
# For every project app with >=2 migrations:
#   1. One fresh SQLite database initialization (apply all once)
#   2. Roll back the latest migration using Django's migration graph
#   3. Re-apply forward to the latest migration
# Fails immediately on any error. No || true. No continue-on-error.
# ═══════════════════════════════════════════════════════════════════════════════
name: Migration Rollback Validation

'on':
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.12"

jobs:
  migration-rollback-validation:
    name: Migration Rollback Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: ${{ inputs.python-version }}
          extra-packages: ""
          cache-key-suffix: "-migration-rollback"
      - name: Run migration rollback validation
        run: |
          set -euo pipefail
          python tools/migration_rollback_validator.py
