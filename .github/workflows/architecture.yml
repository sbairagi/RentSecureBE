# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 5: Architecture & Maintainability
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: import-linter (layered architecture validation)
# ═══════════════════════════════════════════════════════════════════════════════
name: Architecture

'on':
  workflow_call:

jobs:
  import-linter:
    name: Stage 5 │ Import Linter (Architecture)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "import-linter"
          cache-key-suffix: "-architecture"
      - name: Run import-linter
        run: lint-imports --config import-linter.ini || true
