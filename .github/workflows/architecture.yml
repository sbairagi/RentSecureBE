# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 5: Architecture & Maintainability
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: import-linter, dependency graph generation, architecture metrics
# ═══════════════════════════════════════════════════════════════════════════════
name: Architecture

'on':
  workflow_call:
    inputs:
      generate_uml:
        description: "Generate UML diagrams as part of architecture stage"
        required: false
        type: boolean
        default: false
      commit_changes:
        description: "Commit generated architecture artifacts back to repo"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: architecture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-architecture:
    name: Stage 5a │ Scan Repository Architecture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      metadata-path: ${{ steps.scan.outputs.metadata-path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-architecture"
      - name: Scan repository architecture
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p architecture/generated
          python scripts/diagrams/generate_uml_from_ast.py \
            --output architecture/generated/architecture.json
          echo "metadata-path=architecture/generated/architecture.json" >> "$GITHUB_OUTPUT"

  import-linter:
    name: Stage 5a │ Import Linter (Architecture)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "import-linter"
          cache-key-suffix: "-architecture"
      - name: Run import-linter
        shell: bash
        run: |
          set -euo pipefail
          lint-imports --config import-linter.ini

  architecture-tests:
    name: Stage 5a │ Architecture Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [import-linter]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-architecture"
      - name: Run architecture tests
        shell: bash
        run: |
          set -euo pipefail
          pytest tests/architecture/ -v --tb=short

  dependency-graph:
    name: Stage 5b │ Dependency Graph
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-architecture]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "pydeps"
          cache-key-suffix: "-architecture"
      - name: Ensure architecture metadata exists
        run: |
          set -euo pipefail
          mkdir -p architecture/generated
          python scripts/diagrams/generate_uml_from_ast.py \
            --output architecture/generated/architecture.json
      - name: Generate dependency graph
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/generate_dependency_graph.py \
            --output architecture/generated/dependency-graph \
            --format dot mmd puml \
            --metadata architecture/generated/architecture.json

  module-dependency:
    name: Stage 5c │ Module Dependency Graph
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-architecture]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "pydeps"
          cache-key-suffix: "-architecture"
      - name: Ensure architecture metadata exists
        run: |
          set -euo pipefail
          mkdir -p architecture/generated
          python scripts/diagrams/generate_uml_from_ast.py \
            --output architecture/generated/architecture.json
      - name: Generate module dependency graph
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/generate_dependency_graph.py \
            --output architecture/generated/module-dependency-graph \
            --format dot mmd \
            --type module \
            --metadata architecture/generated/architecture.json

  architecture-metrics:
    name: Stage 5d │ Architecture Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-architecture]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-architecture"
      - name: Ensure architecture metadata exists
        run: |
          set -euo pipefail
          mkdir -p architecture/generated
          python scripts/diagrams/generate_uml_from_ast.py \
            --output architecture/generated/architecture.json
      - name: Generate architecture metrics
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/generate_architecture_metrics.py \
            --output architecture/generated/architecture-metrics.json \
            --metadata architecture/generated/architecture.json
      - name: Upload metrics artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: architecture-metrics
          path: architecture/generated/architecture-metrics.json
          retention-days: 30

  architecture-summary:
    name: Stage 5e │ Architecture Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-architecture, architecture-metrics]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: architecture-metrics
          path: architecture/
      - name: Ensure architecture metadata exists
        run: |
          set -euo pipefail
          mkdir -p architecture/generated
          python scripts/diagrams/generate_uml_from_ast.py \
            --output architecture/generated/architecture.json
      - name: Generate architecture summary
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/generate_architecture_summary.py \
            --metadata architecture/generated/architecture.json \
            --output architecture/generated/architecture-summary.md
      - name: Upload summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: architecture-summary
          path: architecture/generated/architecture-summary.md
          retention-days: 30

  component-dependency:
    name: Stage 5f │ Component Dependency Graph
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-architecture]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "pydeps"
          cache-key-suffix: "-architecture"
      - name: Ensure architecture metadata exists
        run: |
          set -euo pipefail
          mkdir -p architecture/generated
          python scripts/diagrams/generate_uml_from_ast.py \
            --output architecture/generated/architecture.json
      - name: Generate component dependency graph
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/generate_dependency_graph.py \
            --output architecture/generated/component-dependency-graph \
            --format dot mmd puml \
            --type component \
            --metadata architecture/generated/architecture.json

    if: ${{ false }}
