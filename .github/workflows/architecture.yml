name: Architecture & Maintainability

"on":
  workflow_call:

jobs:
  vulture:
    name: Vulture (Dead Code)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443

      - name: Install Vulture
        run: |
          python -m pip install --upgrade pip
          pip install vulture

      - name: Run Vulture (dead code detection) — advisory, non-blocking
        run: |
          python -m vulture \
            --exclude .venv,venv,build,dist,migrations,__pycache__,.pytest_cache,.github,.kilo \
            --exclude properties/_legacy,properties/refactored_models_combined.py,properties/original_models.py \
            --exclude properties/signals,core/signals.py,referral_and_earn/signals.py \
            --min-confidence 80 \
            rentsecure_be core properties finance notification documents smartbot referral_and_earn ai_assistant dashboard \
            2>&1 | tee vulture-report.txt || true

  import-linter:
    name: Import Linter (Architecture)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443

      - name: Install import-linter
        run: |
          python -m pip install --upgrade pip
          pip install import-linter

      - name: Run import-linter (advisory, non-blocking)
        run: lint-imports --config import-linter.ini || true
