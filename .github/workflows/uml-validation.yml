      - name: Generate DDD bounded context diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/generate_ddd_diagrams.py \
            --output docs/uml/generated/ddd \
            --all \
            --metadata architecture/generated/architecture.json

  validate-metadata:
    name: Validate Architecture Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-architecture]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
