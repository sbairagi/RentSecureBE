        run: |
          set -euo pipefail
          python scripts/diagrams/validate_diagrams.py \
            --type c4 \
            --path docs/diagrams/generated/c4 \
            --fail-on-error

  validate-links:
    name: Validate Diagram Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-architecture, generate-domain, generate-flows, generate-infrastructure, generate-ddd]
    steps:
      - name: Checkout code
