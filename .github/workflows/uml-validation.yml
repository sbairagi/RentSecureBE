          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
