      - name: Validate diagram links
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_diagram_links.py \
            --docs-dir docs/uml \
            --fail-on-broken

  check-missing-diagrams:
    name: Check Missing Diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-architecture, generate-plantuml, generate-mermaid, generate-c4, generate-domain, generate-flows, generate-infrastructure, generate-ddd]
