# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 7: UML Validation
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: PlantUML syntax, Mermaid syntax, broken links, missing diagrams
# ═══════════════════════════════════════════════════════════════════════════════
name: UML Validation

'on':
  workflow_call:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: uml-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-metadata:
    name: Validate Architecture Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Generate architecture metadata
        run: |
          set -euo pipefail
          python scripts/diagrams/generate_uml_from_ast.py \
            --output architecture/generated/architecture.json
      - name: Validate metadata schema
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_architecture_metadata.py

  validate-plantuml:
    name: Validate PlantUML Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "plantuml"
          cache-key-suffix: "-uml-validation"
      - name: Validate PlantUML diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_diagrams.py \
            --type plantuml \
            --path docs/uml/generated/plantuml \
            --fail-on-error

  validate-mermaid:
    name: Validate Mermaid Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Validate Mermaid diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_diagrams.py \
            --type mermaid \
            --path docs/uml/generated/mermaid \
            --fail-on-error

  validate-c4:
    name: Validate C4 Diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Validate C4 diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_diagrams.py \
            --type c4 \
            --path docs/diagrams/generated/c4 \
            --fail-on-error

  validate-links:
    name: Validate Diagram Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Validate diagram links
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_diagram_links.py \
            --docs-dir docs/uml \
            --fail-on-broken

  check-missing-diagrams:
    name: Check Missing Diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Check for missing diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/check_missing_diagrams.py \
            --docs-dir docs \
            --required-diagrams scripts/diagrams/required_diagrams.txt \
            --fail-on-missing

  check-outdated:
    name: Check Outdated Diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Check for outdated diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/check_outdated_diagrams.py \
            --source-dir . \
            --diagram-dir docs/uml \
            --fail-on-outdated
