# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 7: UML Validation
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: PlantUML syntax, Mermaid syntax, broken links, missing diagrams
# ═══════════════════════════════════════════════════════════════════════════════
name: UML Validation

'on':
  workflow_call:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: uml-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-metadata:
    name: Validate Architecture Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Generate architecture metadata
        run: |
          set -euo pipefail
          python scripts/diagrams/generate_uml_from_ast.py \
            --output architecture/generated/architecture.json
      - name: Validate metadata schema
        shell: bash
        run: |
           set -euo pipefail
           python -c "
             import json, sys
             from pathlib import Path

             path = Path('architecture/generated/architecture.json')
             if not path.exists():
                 print('ERROR: architecture.json not found')
                 sys.exit(1)

             data = json.loads(path.read_text())
             required_keys = ['generated_at', 'root', 'django_apps', 'installed_apps', 'feature_flags', 'apps', 'urls', 'dependencies', 'celery', 'infrastructure']
             missing = [k for k in required_keys if k not in data]
             if missing:
                 print(f'ERROR: Missing required keys: {missing}')
                 sys.exit(1)

             if not isinstance(data['apps'], dict) or len(data['apps']) == 0:
                 print('ERROR: apps must be a non-empty dict')
                 sys.exit(1)

             for app_name, app_data in data['apps'].items():
                 if not isinstance(app_data, dict):
                     print(f'ERROR: app {app_name} must be a dict')
                     sys.exit(1)
                 for key in ['models', 'views', 'serializers', 'urls', 'services', 'files']:
                     if key not in app_data:
                         print(f'ERROR: app {app_name} missing key: {key}')
                         sys.exit(1)

             print('Architecture metadata validation passed')
           "

  validate-plantuml:
    name: Validate PlantUML Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "plantuml"
          cache-key-suffix: "-uml-validation"
      - name: Install PlantUML
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq graphviz default-jre-headless
      - name: Validate PlantUML diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_diagrams.py \
            --type plantuml \
            --path docs/uml/generated/plantuml \
            --fail-on-error

  validate-mermaid:
    name: Validate Mermaid Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Validate Mermaid diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_diagrams.py \
            --type mermaid \
            --path docs/uml/generated/mermaid \
            --fail-on-error

  validate-c4:
    name: Validate C4 Diagrams
