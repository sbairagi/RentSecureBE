      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Validate C4 diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_diagrams.py \
            --type c4 \
            --path docs/diagrams/generated/c4 \
            --fail-on-error

  validate-links:
    name: Validate Diagram Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Validate diagram links
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_diagram_links.py \
            --docs-dir docs/uml \
            --fail-on-broken

  check-missing-diagrams:
    name: Check Missing Diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Check for missing diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/check_missing_diagrams.py \
            --docs-dir docs \
            --required-diagrams scripts/diagrams/required_diagrams.txt \
            --fail-on-missing

  check-outdated:
    name: Check Outdated Diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Check for outdated diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/check_outdated_diagrams.py \
            --source-dir . \
            --diagram-dir docs/uml \
            --fail-on-outdated
