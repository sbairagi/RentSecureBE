            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml-validation"
      - name: Generate architecture metadata
        run: |
          set -euo pipefail
          python scripts/diagrams/generate_uml_from_ast.py \
            --output architecture/generated/architecture.json
      - name: Validate metadata schema
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_architecture_metadata.py

  validate-plantuml:
    name: Validate PlantUML Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-architecture, generate-plantuml]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
