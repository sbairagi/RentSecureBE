          extra-packages: "plantuml"
          cache-key-suffix: "-uml-validation"
      - name: Validate PlantUML diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/validate_diagrams.py \
            --type plantuml \
            --path docs/uml/generated/plantuml \
            --fail-on-error

  validate-mermaid:
    name: Validate Mermaid Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-architecture, generate-mermaid]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
