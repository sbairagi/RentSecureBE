# ═══════════════════════════════════════════════════════════════════════════════
# CI METRICS: Collect and summarize GitHub Actions performance data
# ═══════════════════════════════════════════════════════════════════════════════
# Triggered after ci.yml completes.
# Collects last 30 successful runs, computes P50/P95/Max runtime, queue time,
# cache hit ratio, and failure rate. Posts summary as workflow artifact and
# (optional) PR comment.
# ═══════════════════════════════════════════════════════════════════════════════
name: CI Metrics

'on':
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  collect-metrics:
    name: Collect CI Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install metrics dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Collect GitHub Actions metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_WORKFLOW: ci.yml
        run: |
          python3 - <<'PY'
          import os, requests, json, math
          from datetime import datetime, timezone

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          workflow = os.environ["TARGET_WORKFLOW"]
          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          url = f"https://api.github.com/repos/{repo}/actions/workflows/{workflow}/runs"
          params = {"per_page": 30, "status": "success"}
          resp = requests.get(url, headers=headers, params=params)
          resp.raise_for_status()
          data = resp.json()
          runs = data.get("workflow_runs", [])

          if not runs:
              print("No successful workflow runs found yet.")
              metrics = {
                  "run_id": int(os.environ.get("GITHUB_RUN_ID", 0)),
                  "timestamp": datetime.now(timezone.utc).isoformat(),
                  "count": 0,
                  "p50_runtime_seconds": None,
                  "p95_runtime_seconds": None,
                  "max_runtime_seconds": None,
                  "avg_queue_time_seconds": None,
                  "cache_hit_rate": None,
                  "failure_rate": None,
              }
          else:
              runtimes = []
              queue_times = []
              cache_hits = []
              failures = 0

              for run in runs:
                  created = datetime.fromisoformat(run["created_at"].replace("Z", "+00:00"))
                  started = datetime.fromisoformat(run["run_started_at"].replace("Z", "+00:00"))
                  updated = datetime.fromisoformat(run["updated_at"].replace("Z", "+00:00"))
                  runtimes.append((updated - started).total_seconds())
                  queue_times.append((started - created).total_seconds())
                  # Cache hit heuristic: jobs with cache restore have ~0s setup time
                  # We approximate by checking if total runtime < threshold
                  if (updated - started).total_seconds() < 600:
                      cache_hits.append(1)
                  else:
                      cache_hits.append(0)

              recent = runs[:30]
              failure_count = sum(1 for r in recent if r.get("conclusion") != "success")
              total = len(runs)

              def percentile(vals, p):
                  if not vals:
                      return None
                  s = sorted(vals)
                  k = (len(s) - 1) * (p / 100.0)
                  f = math.floor(k)
                  c = math.ceil(k)
                  if f == c:
                      return s[int(k)]
                  return s[f] * (c - k) + s[c] * (k - f)

              metrics = {
                  "run_id": int(os.environ.get("GITHUB_RUN_ID", 0)),
                  "timestamp": datetime.now(timezone.utc).isoformat(),
                  "count": total,
                  "p50_runtime_seconds": percentile(runtimes, 50),
                  "p95_runtime_seconds": percentile(runtimes, 95),
                  "max_runtime_seconds": max(runtimes) if runtimes else None,
                  "avg_queue_time_seconds": sum(queue_times) / len(queue_times) if queue_times else None,
                  "cache_hit_rate": sum(cache_hits) / len(cache_hits) if cache_hits else None,
                  "failure_rate": failure_count / total if total else None,
              }

          out_path = "ci-metrics.json"
          with open(out_path, "w") as f:
              json.dump(metrics, f, indent=2, default=str)
          print(json.dumps(metrics, indent=2, default=str))
          PY

      - name: Generate CI Metrics Markdown Summary
        env:
          METRICS_JSON: ci-metrics.json
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime

          with open("ci-metrics.json") as f:
              m = json.load(f)

          def fmt(seconds):
              if seconds is None:
                  return "N/A"
              secs = int(seconds)
              if secs < 60:
                  return f"{secs}s"
              mins, sec = divmod(secs, 60)
              return f"{mins}m {sec}s"

          def pct(rate):
              if rate is None:
                  return "N/A"
              return f"{rate*100:.1f}%"

          md = f"""# CI Metrics Summary

          | Metric | Value |
          |--------|-------|
          | Runs Sampled | {m.get('count', 0)} |
          | P50 Runtime | {fmt(m.get('p50_runtime_seconds'))} |
          | P95 Runtime | {fmt(m.get('p95_runtime_seconds'))} |
          | Max Runtime | {fmt(m.get('max_runtime_seconds'))} |
          | Avg Queue Time | {fmt(m.get('avg_queue_time_seconds'))} |
          | Cache Hit Rate | {pct(m.get('cache_hit_rate'))} |
          | Failure Rate | {pct(m.get('failure_rate'))} |
          | Critical Path | lint-fast → test-shard-1/2/3/4 → quality → deploy-readiness → deploy |
          | Runtime Trend | Measured via GitHub Actions API (last 30 successful runs) |

          > Generated: {datetime.now().isoformat()}
          """
          with open("ci-metrics-summary.md", "w") as f:
              f.write(md)
          print(md)
          PY

      - name: Upload CI metrics
        uses: actions/upload-artifact@v4
        with:
          name: ci-metrics
          path: |
            ci-metrics.json
            ci-metrics-summary.md
          retention-days: 90

      - name: Post metrics comment on PR
        if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: ci-metrics-summary.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
