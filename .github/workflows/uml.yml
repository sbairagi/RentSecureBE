            --all \
            --metadata architecture/generated/architecture.json
      - name: Upload Mermaid artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: uml-mermaid
          path: docs/uml/generated/mermaid/**
          retention-days: 30

