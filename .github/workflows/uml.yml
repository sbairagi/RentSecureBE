# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 6: UML Automation System
# ═══════════════════════════════════════════════════════════════════════════════
# Runs: PlantUML, Mermaid, C4 diagrams, domain flows, deployment diagrams
# ═══════════════════════════════════════════════════════════════════════════════
name: UML Generation

'on':
  workflow_call:
    inputs:
      commit_changes:
        description: "Commit generated UML diagrams back to repo"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: uml-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan-architecture:
    name: Scan Repository Architecture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      metadata-path: ${{ steps.scan.outputs.metadata-path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          cache-key-suffix: "-uml"
      - name: Scan repository architecture
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p architecture/generated
          python scripts/diagrams/generate_uml_from_ast.py \
            --output architecture/generated/architecture.json
          echo "metadata-path=architecture/generated/architecture.json" >> "$GITHUB_OUTPUT"

  generate-plantuml:
    name: Generate PlantUML Diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [scan-architecture]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "plantuml"
          cache-key-suffix: "-uml"
      - name: Ensure architecture metadata exists
        run: |
          set -euo pipefail
          mkdir -p architecture/generated
          python scripts/diagrams/generate_uml_from_ast.py \
            --output architecture/generated/architecture.json
      - name: Generate PlantUML diagrams
        shell: bash
        run: |
          set -euo pipefail
          python scripts/diagrams/generate_plantuml.py \
            --output docs/uml/generated/plantuml \
            --all \
            --metadata architecture/generated/architecture.json
      - name: Upload PlantUML artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: uml-plantuml
          path: docs/uml/generated/plantuml/**
          retention-days: 30

  generate-mermaid:
    name: Generate Mermaid Diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [scan-architecture]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            api.github.com:443
            pypi.org:443
            pypi.pythonhosted.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
