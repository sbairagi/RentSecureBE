  commit-uml:
    name: Commit UML Artifacts
    if: ${{ false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scan-architecture, generate-plantuml, generate-mermaid, generate-c4, generate-domain, generate-flows, generate-infrastructure, generate-ddd]
    steps:
      - name: Disabled - use artifacts instead
        run: echo "UML artifacts are uploaded as workflow artifacts. Use ghpulls or release workflow to publish."
