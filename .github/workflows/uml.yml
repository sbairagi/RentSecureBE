      - name: Upload C4 artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: uml-c4
          path: docs/diagrams/generated/c4/**
          retention-days: 30

  generate-domain:
    name: Generate Domain Diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 15
