name: Test

on:
  workflow_call: {}

jobs:
  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install bandit
      - name: Run Bandit
        run: |
          python -m bandit -r rentsecure_be -x .venv,venv,migrations,.kilo
          python -m bandit -r core -x .venv,venv,migrations,.kilo,core/tests
          python -m bandit -r properties -x .venv,venv,migrations,.kilo,properties/tests,properties/test_*
          python -m bandit -r ai_assistant -x .venv,venv,migrations,.kilo,ai_assistant/tests,ai_assistant/tests.py
          python -m bandit -r notification -x .venv,venv,migrations,.kilo,notification/tests,notification/test_*
          python -m bandit -r finance -x .venv,venv,migrations,.kilo,finance/tests,finance/tests.py
          python -m bandit -r smartbot -x .venv,venv,migrations,.kilo,smartbot/tests.py
          python -m bandit -r referral_and_earn -x .venv,venv,migrations,.kilo,referral_and_earn/tests.py
          python -m bandit -r dashboard -x .venv,venv,migrations,.kilo
          python -m bandit -r documents -x .venv,venv,migrations,.kilo,documents/tests.py

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rentsecure_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install setuptools coverage psycopg2-binary
      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest
          python -m coverage xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifact
          path: |
            coverage.xml
            .coverage
          retention-days: 14

  coverage:
    name: Coverage
    needs: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-artifact
      - name: Check coverage threshold
        run: |
          python -m pip install --upgrade pip
          pip install coverage
          python -m coverage report --fail-under=90
          python -m coverage xml

  pip-audit:
    name: Pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Run Pip-audit
        run: python -m pip-audit --requirement=requirements.txt
