# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 2a: Pytest + Coverage
# ═══════════════════════════════════════════════════════════════════════════════
# Called as reusable workflow with shard and total inputs from ci.yml.
# ═══════════════════════════════════════════════════════════════════════════════
name: Test

'on':
  workflow_call:
    inputs:
      shard:
        description: "Shard number (1-indexed)"
        type: number
        default: 1
      total:
        description: "Total number of shards"
        type: number
        default: 4

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}-${{ inputs.shard }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Stage 2a │ Pytest + Coverage (Shard ${{ inputs.shard }}/${{ inputs.total }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: .
      USE_SQLITE: "True"
      SECRET_KEY: "test-secret-key-pytest-job-2026-abcdefghijklmnopqrstuvwxyz1234567890!"
      DEBUG: "False"
      DJANGO_ENV: test
      ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      COVERAGE_FILE: .coverage.${{ inputs.shard }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "pytest-django pytest-cov pytest-randomly"
          cache-key-suffix: "-test-shard-${{ inputs.shard }}"
      - name: Validate test collection
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest --collect-only -q tests/
      - name: Run tests with coverage (shard ${{ inputs.shard }}/${{ inputs.total }})
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -v --randomly-seed=last \
            --cov-fail-under=0 \
            --cov=rentsecure_be \
            --cov=ai_assistant \
            --cov=core \
            --cov=dashboard \
            --cov=documents \
            --cov=finance \
            --cov=notification \
            --cov=properties \
            --cov=referral_and_earn \
            --cov=smartbot \
            tests/
      - name: Generate shard metrics
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          payload = {
              'shard': int('${{ inputs.shard }}'),
              'total': int('${{ inputs.total }}'),
              'coverage_file': '.coverage.${{ inputs.shard }}',
              'workflow': 'test.yml',
          }
          with open('shard-metrics.json', 'w', encoding='utf-8') as fh:
              json.dump(payload, fh, indent=2)
          print(json.dumps(payload, indent=2))
          PY
      - name: "TEMP: coverage artifact diagnostics"
        shell: bash
        run: |
          set -euo pipefail
          echo "PWD=$(pwd)"
          echo "COVERAGE_FILE=${COVERAGE_FILE:-UNSET}"
          echo "--- find .coverage* ---"
          find . -maxdepth 2 -name ".coverage*" -ls 2>/dev/null || true
          echo "--- ls -la .coverage* ---"
          ls -la .coverage* 2>/dev/null || echo "No .coverage* files in listing"
      - name: Upload coverage shard
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-shard-${{ inputs.shard }}
          path: .coverage.${{ inputs.shard }}
          include-hidden-files: true
          retention-days: 30
      - name: Upload shard metrics artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: shard-metrics-${{ inputs.shard }}
          path: shard-metrics.json
          retention-days: 30
      - name: Run migration application validation on clean DB
        run: |
          rm -f db.sqlite3
          python manage.py migrate --run-syncdb --verbosity=2
          echo "Migration application on clean database succeeded."
