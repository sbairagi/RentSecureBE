# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 2a: Pytest + Coverage
# ═══════════════════════════════════════════════════════════════════════════════
# Called as reusable workflow with shard and total inputs from ci.yml.
# ═══════════════════════════════════════════════════════════════════════════════
name: Test

'on':
  workflow_call:
    inputs:
      shard:
        description: "Shard number (1-indexed)"
        type: number
        default: 1
      total:
        description: "Total number of shards"
        type: number
        default: 4

jobs:
  pytest:
    name: Stage 2a │ Pytest + Coverage (Shard ${{ inputs.shard }}/${{ inputs.total }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      USE_SQLITE: "True"
      SECRET_KEY: "test-secret-key-pytest-job-2026!"
      DEBUG: "False"
      DJANGO_ENV: test
      ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      COVERAGE_FILE: .coverage.${{ inputs.shard }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            files.pythonhosted.org:443
      - uses: ./.github/actions/setup-python-environment
        with:
          python-version: "3.12"
          extra-packages: "pytest-django pytest-cov pytest-randomly"
          cache-key-suffix: "-test-shard-${{ inputs.shard }}"
      - name: Validate test collection
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest --collect-only -q tests/
      - name: Run tests with coverage (shard ${{ inputs.shard }}/${{ inputs.total }})
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -v --randomly-seed=last \
            --cov=. \
            --cov-report=term-missing \
            tests/
      - name: Generate shard metrics
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          payload = {
              'shard': int('${{ inputs.shard }}'),
              'total': int('${{ inputs.total }}'),
              'coverage_file': '.coverage.${{ inputs.shard }}',
              'workflow': 'test.yml',
          }
          with open('shard-metrics.json', 'w', encoding='utf-8') as fh:
              json.dump(payload, fh, indent=2)
          print(json.dumps(payload, indent=2))
          PY
      - name: Upload coverage shard
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-${{ inputs.shard }}
          path: .coverage.${{ inputs.shard }}
          retention-days: 30
      - name: Upload shard metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: shard-metrics-${{ inputs.shard }}
          path: shard-metrics.json
          retention-days: 30
      - name: Run migration application validation on clean DB
        run: |
          rm -f db.sqlite3
          python manage.py migrate --run-syncdb --verbosity=2
          echo "Migration application on clean database succeeded."
