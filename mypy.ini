[mypy]
python_version = 3.12
strict = True
follow_imports = silent
ignore_missing_imports = True
disallow_untyped_calls = True
allow_untyped_globals = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True
check_untyped_defs = True
no_implicit_optional = True
strict_equality = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
show_column_numbers = True
pretty = True
exclude = (?x)(^|/)(\.venv|venv|build|dist|migrations|tests|__pycache__|\.pytest_cache|properties/refactored_models_combined\.py|properties/original_models\.py|properties/_legacy|properties/test_.*\.py)(/|$)
plugins = mypy_django_plugin.main

[mypy.plugins.django-stubs]
django_settings_module = "rentsecure_be.settings"
