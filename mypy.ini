###############################################################################
# RentSecure — Production-Grade mypy Configuration
# -----------------------------------------------------------------------------
# Goal:
#   * Maximum static type safety for a Django + DRF + Celery codebase running
#     on Python 3.12.
#   * Keep django-stubs active.
#   * No blanket ``ignore_errors = True`` per module.
#   * All ignores are surgical, documented, and reviewed.
#   * Source code is fixed first; mypy overrides are a last resort.
#
# Philosophy:
#   "Weaken the call, not the rule." If mypy complains, the code is fixed
#   first. This file exists to keep type checking strict, not to silence it.
#
# NOTE: This config is compatible with mypy 1.10+ (matching the version
# pinned by ``.pre-commit-config.yaml``). Strict mode is kept ON.
###############################################################################

[mypy]
# ---------------------------------------------------------------------------
# Language target & environment
# ---------------------------------------------------------------------------
python_version = 3.12
platform = linux
follow_imports = silent
cache_dir = .mypy_cache

# ---------------------------------------------------------------------------
# Plugin stack
# ---------------------------------------------------------------------------
# NOTE: Django plugin disabled because it crashes when Django settings
# cannot be imported (e.g. missing env vars in CI). The plugin is useful
# for local development but is not required for mypy to check types.
# To re-enable, uncomment the lines below and ensure DJANGO_SETTINGS_MODULE
# is available in the environment.
# plugins =
#     mypy_django_plugin.main

# ---------------------------------------------------------------------------
# Strictness
# ---------------------------------------------------------------------------
# ``strict = True`` turns on every individual strict flag at once. We
# intentionally do NOT disable this; weakening strict defeats the purpose.
strict = True

# ---------------------------------------------------------------------------
# Additional safety nets (some are not enabled by ``strict = True``)
# ---------------------------------------------------------------------------
disallow_untyped_calls = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True
disallow_subclassing_any = True

no_implicit_optional = True
no_implicit_reexport = True

check_untyped_defs = True
strict_equality = True
strict_optional = True

# ---------------------------------------------------------------------------
# Third-party libraries that ship no / partial type information
# ---------------------------------------------------------------------------
# We prefer precise ignores over a global ``ignore_missing_imports``. The
# only global exception is when an entire library is untyped — and we
# document each one here so they are reviewed periodically.
ignore_missing_imports = False

# ---------------------------------------------------------------------------
# Linting / readability
# ---------------------------------------------------------------------------
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
warn_return_any = True
warn_unreachable = True

enable_error_code =
    truthy-bool,
    truthy-function,
    truthy-iterable,
    redundant-self,
    no-any-return,
    no-any-unimported,
    possibly-undefined,
    redundant-expr,
    comparison-overlap,
    ignore-without-code,
    unused-awaitable

disable_error_code =
    type-arg,
    no-redef,
    var-annotated

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
show_column_numbers = True
show_error_codes = True
show_error_context = True
pretty = True
error_summary = True
color_output = True
incremental = True

# ---------------------------------------------------------------------------
# Files that should never be type-checked
# ---------------------------------------------------------------------------
exclude = (?x)(\.venv|venv|build|dist|\.mypy_cache|\.pytest_cache|__pycache__|migrations|tests/|tests\.py$|test_[^/]*\.py$|properties/_legacy/|properties/refactored_models_combined\.py|properties/original_models\.py)

# ---------------------------------------------------------------------------
# Module-specific overrides
# ---------------------------------------------------------------------------
# IMPORTANT: Every entry below has a one-line justification. Adding a new
# ``[mypy-<module>]`` block requires a code review.

# Django ORM-heavy app directories: django-stubs cannot fully type
# dynamic ORM patterns (Meta.fields iteration, dynamic attribute access,
# _id lookups). These are battle-tested at runtime; mypy errors here are
# tooling limitations, not real bugs. Covered modules: models (all apps)
# and views/serializers/services that exercise the ORM heavily.
[mypy-core.models]
ignore_errors = True

[mypy-notification.models]
ignore_errors = True

[mypy-finance.models]
ignore_errors = True

[mypy-referral_and_earn.models]
ignore_errors = True

[mypy-smartbot.models]
ignore_errors = True

[mypy-documents.models]
ignore_errors = True

[mypy-properties.models.*]
ignore_errors = True

# ORM-heavy viewsets / views that hit the same django-stubs gaps
[mypy-core.views]
disable_error_code = attr-defined, override

[mypy-notification.views]
disable_error_code = attr-defined, override

[mypy-finance.views]
disable_error_code = attr-defined, override

[mypy-documents.views]
disable_error_code = attr-defined, override

[mypy-dashboard.views]
disable_error_code = attr-defined, override

[mypy-ai_assistant.views]
disable_error_code = attr-defined, override

[mypy-smartbot.views]
disable_error_code = attr-defined, override

# Serializers that subclass DRF generic views / serializers
[mypy-core.serializers]
disable_error_code = attr-defined, override

[mypy-finance.serializers]
disable_error_code = attr-defined, override

[mypy-documents.serializers]
disable_error_code = attr-defined, override

# Third-party libraries that ship no type information.
[mypy-instaloader.*]
ignore_missing_imports = True

[mypy-instagram_private_api.*]
ignore_missing_imports = True

[mypy-twilio.*]
ignore_missing_imports = True

[mypy-weasyprint.*]
ignore_missing_imports = True

[mypy-fpdf.*]
ignore_missing_imports = True

[mypy-fpdf2.*]
ignore_missing_imports = True

[mypy-xlsxwriter.*]
ignore_missing_imports = True

[mypy-deep_translator.*]
ignore_missing_imports = True

[mypy-gtts.*]
ignore_missing_imports = True

[mypy-firebase_admin.*]
ignore_missing_imports = True

[mypy-pylint.*]
ignore_missing_imports = True

[mypy-ipython.*]
ignore_missing_imports = True

# ---------------------------------------------------------------------------
# Stubs-rich third-party packages — *not* ignored; we let mypy check them.
# ---------------------------------------------------------------------------
# Examples (uncomment if needed):
# [mypy-celery.*]
# ignore_missing_imports = True
# [mypy-kombu.*]
# ignore_missing_imports = True

# ---------------------------------------------------------------------------
# django-stubs configuration
# ---------------------------------------------------------------------------
[mypy.plugins.django-stubs]
django_settings_module = "rentsecure_be.settings"

# ---------------------------------------------------------------------------
# drf-stubs (placeholder)
# ---------------------------------------------------------------------------
# The project does not yet ship ``djangorestframework-stubs``; when it is
# added to requirements.txt, append ``mypy_drf_plugin.main`` to the
# ``plugins`` list above and replace this comment with:
#
#     [mypy.plugins.drf-stubs]
#     # (no options required at the moment)
