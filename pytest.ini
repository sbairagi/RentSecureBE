# pytest.ini
[pytest]
DJANGO_SETTINGS_MODULE = rentsecure_be.settings
python_files = tests.py test_*.py *_tests.py
addopts = --strict-markers --strict-config --tb=short --durations=10 --cov=. --cov-report=term-missing --cov-report=xml
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
testpaths = .
