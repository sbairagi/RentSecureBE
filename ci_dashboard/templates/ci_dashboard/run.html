{% extends "ci_dashboard/base.html" %}
{% load static ci_dashboard_tags %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1 class="h2">Run Workflow</h1>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card bg-dark border-secondary">
            <div class="card-header bg-dark border-secondary">
                <h5 class="mb-0">Select Workflow</h5>
            </div>
            <div class="card-body">
                <form method="post" id="run-form">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="workflow_file" class="form-label text-light">Workflow File</label>
                        <select id="workflow_file" name="workflow_file" class="form-select bg-dark text-light border-secondary" required>
                            <option value="">-- Select a workflow --</option>
                            {% for wf in workflow_files %}
                            <option value="{{ wf }}">{{ wf }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-play-fill"></i> Run Workflow
                    </button>
                    <a href="{% url 'ci_dashboard:dashboard' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card bg-dark border-secondary">
            <div class="card-header bg-dark border-secondary">
                <h5 class="mb-0">Quick Actions</h5>
            </div>
            <div class="card-body">
                <div class="d-grid gap-2">
                    <button type="button" class="btn btn-outline-primary" onclick="runWorkflow('ci.yml')">
                        <i class="bi bi-play"></i> Run Full CI
                    </button>
                    <button type="button" class="btn btn-outline-info" onclick="runWorkflow('lint.yml')">
                        <i class="bi bi-brush"></i> Run Lint
                    </button>
                    <button type="button" class="btn btn-outline-warning" onclick="runWorkflow('security.yml')">
                        <i class="bi bi-shield-check"></i> Run Security
                    </button>
                    <button type="button" class="btn btn-outline-success" onclick="runWorkflow('test.yml')">
                        <i class="bi bi-check2-square"></i> Run Tests
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-12">
        <div class="card bg-dark border-secondary">
            <div class="card-header bg-dark border-secondary">
                <h5 class="mb-0">Available Workflows</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    {% for wf in workflow_files %}
                    <div class="col-md-4 col-sm-6">
                        <div class="card bg-dark border-secondary h-100">
                            <div class="card-body">
                                <h6 class="card-title text-white">{{ wf }}</h6>
                                <form method="post" action="{% url 'ci_dashboard:run' %}" class="d-inline">
                                    {% csrf_token %}
                                    <input type="hidden" name="workflow_file" value="{{ wf }}">
                                    <button type="submit" class="btn btn-sm btn-outline-light w-100">Run</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
